name: Update viable/strict
'on':
  schedule:
  - cron: 17,47 * * * *
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  do_update_viablestrict:
    permissions:
      id-token: write
    if: ${{ github.repository_owner == 'playground-nils' }}
    runs-on: ubuntu-24.04
    environment: ${{ (github.event_name == 'schedule') && 'mergebot' || '' }}
    steps:
    - name: Update viable/strict
      uses: pytorch/test-infra/.github/actions/update-viablestrict@main
      id: update_viablestrict
      with:
        repository: pytorch/pytorch
        stable-branch: viable/strict
        requires: '[\"pull\", \"trunk\", \"lint\"]'
        secret-bot-token: ${{ secrets.MERGEBOT_TOKEN }}
        clickhouse-url: ${{ secrets.CLICKHOUSE_URL }}
        clickhouse-username: ${{ secrets.CLICKHOUSE_VIABLESTRICT_USERNAME }}
        clickhouse-password: ${{ secrets.CLICKHOUSE_VIABLESTRICT_PASSWORD }}
    - name: Authenticate to AWS with OIDC
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::308535385114:role/upload_to_ossci_raw_job_status
        aws-region: us-east-1
    - name: Print sha
      env:
        LATEST_SHA: ${{ steps.update_viablestrict.outputs.latest_viable_sha }}
        PUSH_RESULT: ${{ steps.update_viablestrict.outputs.push_result }}
        TIME: ${{ steps.update_viablestrict.outputs.time }}
      run: "echo \"${PUSH_RESULT}\"\nif [ \"$PUSH_RESULT\" = \"Everything up-to-date\"\
        \ ]; then\n  echo \"No update pushed\"\nelif [ \"${LATEST_SHA}\" == \"None\"\
        \ ]; then\n  echo \"No viable/strict candidate found\"\nelse\n  echo \"{\\\
        \"sha\\\": \\\"${LATEST_SHA}\\\", \\\"repository\\\":\\\"pytorch/pytorch\\\
        \", \\\"timestamp\\\": ${TIME}}\" > \"/tmp/${LATEST_SHA}.json\"\n  pip install\
        \ awscli==1.29.40\n  aws s3 cp \"/tmp/${LATEST_SHA}.json\" \"s3://ossci-raw-job-status/stable_pushes/pytorch/pytorch/${LATEST_SHA}.json\"\
        \n  # Push new viable/strict tag\n  cd pytorch/pytorch\n  git push origin\
        \ \"${LATEST_SHA}:refs/tags/viable/strict/${TIME}\"\nfi\n"
