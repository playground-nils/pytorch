name: build docs
'on':
  workflow_call:
    inputs:
      build-environment:
        required: true
        type: string
        description: Top-level label for what's being built/tested.
      docker-image:
        required: true
        type: string
        description: Docker image to run in.
      push:
        required: false
        type: boolean
        default: false
        description: If set, push the docs to the docs website.
      run-doxygen:
        required: false
        type: boolean
        default: false
        description: If set, will enable C++ API doc generation using doxygen / breathe
          / exhale.
      sync-tag:
        required: false
        type: string
        default: ''
        description: 'If this is set, our linter will use this to make sure that every
          other

          job with the same `sync-tag` is identical.

          '
      s3-bucket:
        description: S3 bucket to download artifact
        required: false
        type: string
        default: gha-artifacts
      aws-role-to-assume:
        description: role to assume for downloading artifacts
        required: false
        type: string
        default: ''
      upload-aws-role-to-assume:
        description: role to assume for downloading artifacts
        required: false
        type: string
        default: ''
      runner_prefix:
        description: prefix for runner label
        type: string
        default: ''
      use-arc:
        required: false
        type: boolean
        default: false
        description: If true, use ARC (OSDC) runner path instead of EC2.
      python-version:
        required: false
        type: string
        default: ''
        description: Python version to use for the OSDC build.
      compiler:
        required: false
        type: string
        default: ''
        description: Compiler to use for the OSDC build.
      cuda-version:
        required: false
        type: string
        default: ''
        description: CUDA version to use for the OSDC build.
    secrets:
      GH_PYTORCHBOT_TOKEN:
        required: false
        description: Permissions for pushing to the docs site.
jobs:
  build-docs:
    if: github.repository_owner == 'playground-nils' && !inputs.use-arc
    runs-on: ${{ matrix.runner }}
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.event.ref,
      'refs/tags/v')) && 'pytorchbot-env' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - docs_type: cpp
          runner: ${{ inputs.runner_prefix }}linux.12xlarge.memory
          timeout-minutes: 360
        - docs_type: python
          runner: ${{ inputs.runner_prefix }}linux.c7i.2xlarge
          timeout-minutes: 60
    name: build-docs-${{ matrix.docs_type }}-${{ inputs.push }}
    steps:
    - name: Setup SSH (Click me for login details)
      uses: pytorch/test-infra/.github/actions/setup-ssh@main
      with:
        github-secret: ${{ secrets.GITHUB_TOKEN }}
        instructions: "All builds are done inside the container, to start an interactive\
          \ session run:\n  docker exec -it $(docker container ps --format '{{.ID}}')\
          \ bash\nTo start Python docs build type:\n  cd docs && make html && make\
          \ coverage\n"
    - name: Setup Linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        checkout-mode: normal
    - name: Login to ECR
      uses: ./.github/actions/ecr-login
      with:
        aws-role-to-assume: ${{ inputs.aws-role-to-assume }}
    - name: Calculate docker image
      id: calculate-docker-image
      uses: pytorch/test-infra/.github/actions/calculate-docker-image@main
      with:
        docker-image-name: ${{ inputs.docker-image }}
    - name: Pull docker image
      uses: pytorch/test-infra/.github/actions/pull-docker-image@main
      with:
        docker-image: ${{ steps.calculate-docker-image.outputs.docker-image }}
    - name: Download build artifacts
      uses: ./.github/actions/download-build-artifacts
      with:
        name: ${{ inputs.build-environment }}
        s3-bucket: ${{ inputs.s3-bucket }}
    - name: Generate netrc (only for docs-push)
      if: inputs.push
      env:
        GITHUB_PYTORCHBOT_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
      run: '# sometimes .netrc exists as a directory even though this is the temp
        folder

        rm -rf "${RUNNER_TEMP}/.netrc"

        # set credentials for https pushing

        echo "machine github.com" > "${RUNNER_TEMP}/.netrc"

        echo "login pytorchbot" >> "${RUNNER_TEMP}/.netrc"

        echo "password ${GITHUB_PYTORCHBOT_TOKEN}" >> "${RUNNER_TEMP}/.netrc"

        '
    - name: Build ${{ matrix.docs_type }} docs
      timeout-minutes: ${{ matrix.timeout-minutes }}
      id: build-docs
      env:
        WITH_PUSH: ${{ inputs.push }}
        DOCKER_IMAGE: ${{ inputs.docker-image }}
        DOCS_TYPE: ${{ matrix.docs_type }}
        RUN_DOXYGEN: ${{ inputs.run-doxygen }}
        BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
      run: "set -ex\n# Convert refs/tags/v1.12.0rc3 into 1.12\nif [[ \"${GITHUB_REF}\"\
        \ =~ ^refs/tags/v([0-9]+\\.[0-9]+)\\.* ]]; then\n  target=\"${BASH_REMATCH[1]}\"\
        \nelse\n  target=\"main\"\nfi\n# detached container should get cleaned up\
        \ by teardown_ec2_linux\ncontainer_name=$(docker run \\\n  -e BUILD_ENVIRONMENT\
        \ \\\n  -e MAX_JOBS=\"$(nproc --ignore=2)\" \\\n  -e SHA1=\"$GITHUB_SHA\"\
        \ \\\n  -e DOCS_VERSION=\"${target}\" \\\n  -e DOCS_TYPE \\\n  -e RUN_DOXYGEN\
        \ \\\n  -e WITH_PUSH \\\n  --env-file=\"/tmp/github_env_${GITHUB_RUN_ID}\"\
        \ \\\n  -e GITHUB_WORKSPACE=/var/lib/jenkins/workspace \\\n  --security-opt\
        \ seccomp=unconfined \\\n  --cap-add=SYS_PTRACE \\\n  --tty \\\n  --detach\
        \ \\\n  --user jenkins \\\n  -v \"${RUNNER_TEMP}/.netrc\":/var/lib/jenkins/.netrc\
        \ \\\n  -v \"${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace\" \\\n  -w /var/lib/jenkins/workspace\
        \ \\\n  \"${DOCKER_IMAGE}\"\n)\ndocker exec -t \"${container_name}\" bash\
        \ -c \"sudo chown -R jenkins . && pip install $(echo dist/*.whl)[opt-einsum]\
        \ && ./.ci/pytorch/${DOCS_TYPE}_doc_push_script.sh\"\n"
    - name: Chown workspace
      uses: ./.github/actions/chown-workspace
      if: always()
    - name: configure aws credentials
      if: ${{ inputs.upload-aws-role-to-assume != '' }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: ${{ inputs.upload-aws-role-to-assume }}
        role-session-name: gha-linux-test
        aws-region: us-east-1
    - name: Upload Python Docs Preview
      if: ${{ github.event_name == 'pull_request' && matrix.docs_type == 'python'
        && steps.build-docs.outcome == 'success' }}
      run: 'aws s3 sync pytorch_docs/main/ s3://doc-previews/pytorch/pytorch/${{ github.event.pull_request.number
        }} --delete --quiet

        '
    - name: Upload C++ Docs Preview
      if: ${{ github.event_name == 'pull_request' && matrix.docs_type == 'cpp' &&
        steps.build-docs.outcome == 'success' }}
      run: 'aws s3 sync cppdocs/ s3://doc-previews/pytorch/pytorch/${{ github.event.pull_request.number
        }}/cppdocs --delete --quiet

        '
    - name: Post C++ Docs Coverage Comment
      if: ${{ github.event_name == 'pull_request' && matrix.docs_type == 'cpp' &&
        steps.build-docs.outcome == 'success' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "PR_NUM=\"${{ github.event.pull_request.number }}\"\nMARKER=\"<!-- cpp-docs-coverage\
        \ -->\"\n\n# Only post if the PR touches docs/cpp\nif ! gh pr diff \"$PR_NUM\"\
        \ --name-only | grep -q '^docs/cpp/'; then\n  echo \"No changes to docs/cpp/,\
        \ skipping coverage comment.\"\n  exit 0\nfi\n\n# Skip if we already posted\n\
        if gh pr view \"$PR_NUM\" --json comments --jq '.comments[].body' | grep -q\
        \ \"$MARKER\"; then\n  echo \"Coverage comment already posted, skipping.\"\
        \n  exit 0\nfi\n\nbody=\"${MARKER}\n## C++ Docs\n\n- [Doc Preview](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/index.html)\n\
        - [API Coverage Report](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/cpp_coverage.txt)\n\
        - [HTML Issues Report](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/cpp_html_issues.txt)\"\
        \n\nif [ -f cppdocs/_coverage/index.html ]; then\n  body=\"${body}\n- [Coverxygen\
        \ Report (interactive)](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/index.html)\"\
        \nfi\n\ngh pr comment \"$PR_NUM\" --body \"$body\"\n"
    - name: Upload C++ Docs Preview (nightly dry-run)
      if: ${{ !inputs.push && github.event_name != 'pull_request' && matrix.docs_type
        == 'cpp' && steps.build-docs.outcome == 'success' }}
      run: '# Use aws s3 cp --recursive for fast parallel uploads instead of uploading
        files one by one

        aws s3 cp cppdocs/ s3://doc-previews/pytorch/pytorch/nightly-${{ github.sha
        }}/cppdocs --recursive --quiet

        echo "C++ docs preview available at:"

        echo "https://docs-preview.pytorch.org/pytorch/pytorch/nightly-${{ github.sha
        }}/cppdocs/index.html"

        '
    - name: Teardown Linux
      uses: pytorch/test-infra/.github/actions/teardown-linux@main
      if: always()
  build-docs-osdc:
    if: github.repository_owner == 'playground-nils' && inputs.use-arc
    permissions:
      id-token: write
      contents: read
      actions: read
    runs-on: ${{ matrix.runner }}
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.event.ref,
      'refs/tags/v')) && 'pytorchbot-env' || '' }}
    container:
      image: ${{ inputs.docker-image }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - docs_type: cpp
          runner: ${{ inputs.runner_prefix }}l-x86iavx512-48-384
          timeout-minutes: 360
        - docs_type: python
          runner: ${{ inputs.runner_prefix }}l-x86iavx512-16-128
          timeout-minutes: 60
    name: build-docs-${{ matrix.docs_type }}-${{ inputs.push }}
    steps:
    - name: Setup Linux
      id: setup-linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        use-arc: true
        python-version: ${{ inputs.python-version }}
        compiler: ${{ inputs.compiler }}
        cuda-version: ${{ inputs.cuda-version }}
        submodules: false
        checkout-mode: normal
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure AWS credentials
      id: aws-creds
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
      with:
        role-to-assume: arn:aws:iam::308535385114:role/arc
        aws-region: us-east-1
        role-duration-seconds: 18000
    - name: Download build artifacts
      uses: pytorch/pytorch/.github/actions/download-build-artifacts@main
      with:
        name: ${{ inputs.build-environment }}
        s3-bucket: ${{ inputs.s3-bucket }}
        use-gha: ${{ steps.aws-creds.outcome != 'success' }}
    - name: Generate netrc (only for docs-push)
      if: inputs.push
      env:
        GITHUB_PYTORCHBOT_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
      run: 'rm -rf "${HOME}/.netrc"

        echo "machine github.com" > "${HOME}/.netrc"

        echo "login pytorchbot" >> "${HOME}/.netrc"

        echo "password ${GITHUB_PYTORCHBOT_TOKEN}" >> "${HOME}/.netrc"

        '
    - name: Build ${{ matrix.docs_type }} docs
      timeout-minutes: ${{ matrix.timeout-minutes }}
      id: build-docs
      env:
        WITH_PUSH: ${{ inputs.push }}
        DOCS_TYPE: ${{ matrix.docs_type }}
        RUN_DOXYGEN: ${{ inputs.run-doxygen }}
        BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
        SHA1: ${{ github.sha }}
      shell: bash
      run: "set -ex\nif [[ \"${GITHUB_REF}\" =~ ^refs/tags/v([0-9]+\\.[0-9]+)\\.*\
        \ ]]; then\n  target=\"${BASH_REMATCH[1]}\"\nelse\n  target=\"main\"\nfi\n\
        export DOCS_VERSION=\"${target}\"\npip install $(echo dist/*.whl)[opt-einsum]\n\
        ./.ci/pytorch/${DOCS_TYPE}_doc_push_script.sh\n"
    - name: Stage docs preview artifact (PR)
      if: ${{ github.event_name == 'pull_request' && steps.build-docs.outcome == 'success'
        }}
      shell: bash
      run: "set -ex\nif [ \"${{ matrix.docs_type }}\" = \"python\" ]; then\n  src_dir=\"\
        pytorch_docs/main\"\nelse\n  src_dir=\"cppdocs\"\nfi\nmkdir -p docs-preview-staging\n\
        cp -r \"${src_dir}\" docs-preview-staging/content\ncat > docs-preview-staging/pr-metadata.txt\
        \ <<EOF\nPR_NUMBER=${{ github.event.pull_request.number }}\nDOCS_TYPE=${{\
        \ matrix.docs_type }}\nSHA=${{ github.sha }}\nEOF\n"
    - name: Upload docs preview artifact (PR)
      if: ${{ github.event_name == 'pull_request' && steps.build-docs.outcome == 'success'
        }}
      uses: actions/upload-artifact@v4
      with:
        name: docs-preview-osdc-${{ matrix.docs_type }}
        path: docs-preview-staging
        retention-days: 14
        if-no-files-found: error
    - name: Post C++ Docs Coverage Comment
      if: ${{ github.event_name == 'pull_request' && matrix.docs_type == 'cpp' &&
        steps.build-docs.outcome == 'success' && github.event.pull_request.head.repo.full_name
        == github.repository }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "PR_NUM=\"${{ github.event.pull_request.number }}\"\nMARKER=\"<!-- cpp-docs-coverage\
        \ -->\"\n\n# Only post if the PR touches docs/cpp\nif ! gh pr diff \"$PR_NUM\"\
        \ --name-only | grep -q '^docs/cpp/'; then\n  echo \"No changes to docs/cpp/,\
        \ skipping coverage comment.\"\n  exit 0\nfi\n\n# Skip if we already posted\n\
        if gh pr view \"$PR_NUM\" --json comments --jq '.comments[].body' | grep -q\
        \ \"$MARKER\"; then\n  echo \"Coverage comment already posted, skipping.\"\
        \n  exit 0\nfi\n\nbody=\"${MARKER}\n## C++ Docs\n\n- [Doc Preview](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/index.html)\n\
        - [API Coverage Report](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/cpp_coverage.txt)\n\
        - [HTML Issues Report](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/cpp_html_issues.txt)\"\
        \n\nif [ -f cppdocs/_coverage/index.html ]; then\n  body=\"${body}\n- [Coverxygen\
        \ Report (interactive)](https://docs-preview.pytorch.org/pytorch/pytorch/${PR_NUM}/cppdocs/_coverage/index.html)\"\
        \nfi\n\ngh pr comment \"$PR_NUM\" --body \"$body\"\n"
  memory-viz-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run MemoryViz JS tests (nonretryable)
      run: node test/profiler/test_memory_viz.js
