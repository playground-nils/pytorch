name: Build Official Docker Images
'on':
  workflow_dispatch: null
  pull_request:
    paths:
    - Dockerfile
    - docker.Makefile
    - .github/workflows/docker-release.yml
    - .github/scripts/generate_docker_release_matrix.py
    - .github/scripts/generate_binary_build_matrix.py
  push:
    branches:
    - nightly
    tags:
    - v[0-9]+.[0-9]+.[0-9]+
    - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
    - ciflow/nightly/*
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
env:
  BUILD_PROGRESS: plain
  BUILD_TYPE: official
  DOCKER_ORG: pytorch
  DOCKER_REGISTRY: ghcr.io
  NO_BUILD_SUFFIX: true
  USE_BUILDX: 1
  WITH_PUSH: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/nightly'
    || startsWith(github.event.ref, 'refs/tags/v')) }}
permissions: read-all
jobs:
  get-label-type:
    if: github.repository_owner == 'playground-nils'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login
        }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
  generate-matrix:
    if: github.repository_owner == 'playground-nils'
    needs: get-label-type
    runs-on: ${{ needs.get-label-type.outputs.label-type }}linux.large
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
    - name: Checkout PyTorch
      uses: pytorch/pytorch/.github/actions/checkout-pytorch@main
      with:
        fetch-depth: 1
        submodules: 'false'
    - name: Get docker release matrix
      id: generate-matrix
      run: 'MATRIX_BLOB="$(python3 .github/scripts/generate_docker_release_matrix.py)"

        echo "${MATRIX_BLOB}"

        echo "matrix=${MATRIX_BLOB}" >> "${GITHUB_OUTPUT}"

        '
  build:
    if: ${{ github.repository == 'pytorch/pytorch' }}
    runs-on: ${{ needs.get-label-type.outputs.label-type }}linux.2xlarge
    environment: ${{ (github.ref == 'refs/heads/nightly' || startsWith(github.event.ref,
      'refs/tags/v')) && 'docker-build' || '' }}
    timeout-minutes: 240
    needs:
    - generate-matrix
    - get-label-type
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    env:
      BUILD_IMAGE_TYPE: ${{ matrix.image_type }}
      BUILD_PLATFORMS: ${{ matrix.platform }}
      CUDA_VERSION: ${{ matrix.cuda_full_version }}
      CUDA_VERSION_SHORT: ${{ matrix.cuda }}
      CUDNN_VERSION: ${{ matrix.cudnn_version }}
    steps:
    - name: Setup SSH (Click me for login details)
      uses: pytorch/test-infra/.github/actions/setup-ssh@main
      with:
        github-secret: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        submodules: 'false'
    - name: Login to ECR
      uses: ./.github/actions/ecr-login
    - name: Login to GitHub Container Registry
      if: ${{ env.WITH_PUSH == 'true' }}
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
      with:
        registry: ghcr.io
        username: pytorch
        password: ${{ secrets.GHCR_PAT }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392
      env:
        QEMU_BINARY_PATH: ${{ runner.temp }}/bin
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      with:
        version: latest
        driver-opts: image=moby/buildkit:v0.19.0
    - name: Setup job specific variables
      run: "set -eou pipefail\n# To get QEMU binaries in our PATH\necho \"${RUNNER_TEMP}/bin\"\
        \ >> \"${GITHUB_PATH}\"\n# Generate PyTorch version to use\n{\n  echo \"PYTORCH_VERSION=$(python3\
        \ .github/scripts/generate_pytorch_version.py --no-build-suffix)\";\n  echo\
        \ \"STABLE_CUDA_VERSION=$(python3 .github/scripts/get_ci_variable.py --stable-cuda-version)\"\
        \n} >> \"${GITHUB_ENV}\"\n"
    - name: Setup test specific variables
      if: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
      run: "if [[ ${{ github.event.ref }} =~ ^refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+-rc[0-9]+$\
        \ ]]; then\n  {\n    echo \"DOCKER_IMAGE=pytorch-test\";\n    echo \"INSTALL_CHANNEL=whl/test\"\
        ;\n    echo \"TRITON_VERSION=$(cut -f 1 .ci/docker/triton_version.txt)\";\n\
        \  } >> \"${GITHUB_ENV}\"\nfi\n"
    - name: Setup nightly specific variables
      if: ${{ github.event_name == 'pull_request' || github.event.ref == 'refs/heads/nightly'
        || startsWith(github.event.ref, 'refs/tags/ciflow/nightly/') }}
      run: "{\n  echo \"DOCKER_IMAGE=pytorch-nightly\";\n  echo \"INSTALL_CHANNEL=whl/nightly\"\
        ;\n  echo \"TRITON_VERSION=$(cut -f 1 .ci/docker/triton_version.txt)+$(cut\
        \ -c -10 .ci/docker/ci_commit_pins/triton.txt)\";\n} >> \"${GITHUB_ENV}\"\n"
    - name: Run docker build / push
      run: 'make -f docker.Makefile "${BUILD_IMAGE_TYPE}-image"

        '
    - name: Push nightly tags
      if: ${{ github.event.ref == 'refs/heads/nightly' && matrix.image_type == 'runtime'
        && matrix.platform == 'linux/amd64' }}
      run: "PYTORCH_DOCKER_TAG=\"${PYTORCH_VERSION}-cuda${CUDA_VERSION_SHORT}-cudnn${CUDNN_VERSION}-runtime\"\
        \nCUDA_SUFFIX=\"-cu${CUDA_VERSION}\"\nPYTORCH_NIGHTLY_COMMIT=$(docker run\
        \ ghcr.io/pytorch/pytorch-nightly:\"${PYTORCH_DOCKER_TAG}\" \\\n         \
        \                       python -c 'import torch; print(torch.version.git_version[:7],end=\"\
        \")')\n\ndocker tag ghcr.io/pytorch/pytorch-nightly:\"${PYTORCH_DOCKER_TAG}\"\
        \ \\\n       ghcr.io/pytorch/pytorch-nightly:\"${PYTORCH_NIGHTLY_COMMIT}${CUDA_SUFFIX}\"\
        \n\ndocker push ghcr.io/pytorch/pytorch-nightly:\"${PYTORCH_NIGHTLY_COMMIT}${CUDA_SUFFIX}\"\
        \n\n# Please note, here we need to pin specific version of CUDA as with latest\
        \ label\nif [[ ${CUDA_VERSION_SHORT} == \"${STABLE_CUDA_VERSION}\" ]]; then\n\
        \  docker tag ghcr.io/pytorch/pytorch-nightly:\"${PYTORCH_NIGHTLY_COMMIT}${CUDA_SUFFIX}\"\
        \ \\\n          ghcr.io/pytorch/pytorch-nightly:latest\n  docker push ghcr.io/pytorch/pytorch-nightly:latest\n\
        fi\n"
    - name: Teardown Linux
      uses: pytorch/test-infra/.github/actions/teardown-linux@main
      if: always()
  validate:
    needs: build
    if: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/nightly'
      || startsWith(github.event.ref, 'refs/tags/v')) }}
    uses: pytorch/test-infra/.github/workflows/validate-docker-images.yml@main
    with:
      channel: nightly
      ref: main
