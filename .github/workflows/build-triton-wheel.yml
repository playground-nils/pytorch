name: Build Triton wheels
'on':
  push:
    branches:
    - main
    tags:
    - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
    - ciflow/triton_binaries/*
    paths:
    - .github/workflows/build-triton-wheel.yml
    - .github/scripts/build_triton_wheel.py
    - .github/ci_commit_pins/triton.txt
    - .github/scripts/windows/install_vs2022.ps1
    - .github/scripts/windows/build_triton.bat
    - .ci/docker/ci_commit_pins/triton.txt
    - .ci/docker/ci_commit_pins/triton-xpu.txt
  workflow_dispatch: null
  pull_request:
    paths:
    - .github/workflows/build-triton-wheel.yml
    - .github/scripts/build_triton_wheel.py
    - .github/ci_commit_pins/triton.txt
    - .github/scripts/windows/install_vs2022.ps1
    - .github/scripts/windows/build_triton.bat
    - .ci/docker/ci_commit_pins/triton.txt
    - .ci/docker/ci_commit_pins/triton-xpu.txt
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
jobs:
  get-label-type:
    if: github.repository_owner == 'playground-nils'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login
        }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
  build-wheel:
    name: Build Triton Wheel
    needs: get-label-type
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        py_vers:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        - 3.14t
        device:
        - cuda
        - rocm
        - xpu
        - aarch64
        docker-image:
        - pytorch/manylinux2_28-builder:cpu
        include:
        - device: rocm
          rocm_version: '7.2'
          runs_on: ${{ needs.get-label-type.outputs.label-type }}linux.4xlarge
        - device: cuda
          rocm_version: ''
          runs_on: ${{ needs.get-label-type.outputs.label-type }}linux.4xlarge
        - device: xpu
          rocm_version: ''
          runs_on: ${{ needs.get-label-type.outputs.label-type }}linux.4xlarge
        - device: aarch64
          rocm_version: ''
          runs_on: ${{ needs.get-label-type.outputs.label-type }}linux.arm64.2xlarge
    timeout-minutes: 40
    env:
      DOCKER_IMAGE: ${{ matrix.device == 'rocm' && format('pytorch/manylinux2_28-builder:rocm{0}',
        matrix.rocm_version) || matrix.device == 'aarch64' && 'pytorch/manylinux2_28_aarch64-builder:cpu-aarch64'
        || matrix.docker-image }}
      PY_VERS: ${{ matrix.py_vers }}
      BUILD_DEVICE: ${{ matrix.device }}
      PLATFORM: manylinux_2_28_x86_64
    steps:
    - name: Setup SSH (Click me for login details)
      uses: pytorch/test-infra/.github/actions/setup-ssh@main
      with:
        github-secret: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        submodules: false
    - name: Login to ECR
      uses: ./.github/actions/ecr-login
    - name: Pull Docker image
      uses: pytorch/test-infra/.github/actions/pull-docker-image@main
      with:
        docker-image: ${{ env.DOCKER_IMAGE }}
    - name: Build Triton wheel
      env:
        IS_RELEASE_TAG: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
      run: "set -x\nmkdir -p \"${RUNNER_TEMP}/artifacts/\"\ncontainer_name=$(docker\
        \ run \\\n  --tty \\\n  --detach \\\n  -v \"${GITHUB_WORKSPACE}:/pytorch\"\
        \ \\\n  -v \"${RUNNER_TEMP}/artifacts:/artifacts\" \\\n  -w /artifacts/ \\\
        \n  \"${DOCKER_IMAGE}\"      \\\n)\n\n# Determine python executable for given\
        \ version\ncase $PY_VERS in\n3.10)\n  PYTHON_EXECUTABLE=/opt/python/cp310-cp310/bin/python\n\
        \  ;;\n3.11)\n  PYTHON_EXECUTABLE=/opt/python/cp311-cp311/bin/python\n  ;;\n\
        3.12)\n  PYTHON_EXECUTABLE=/opt/python/cp312-cp312/bin/python\n  ;;\n3.13)\n\
        \  PYTHON_EXECUTABLE=/opt/python/cp313-cp313/bin/python\n  ;;\n3.14)\n  PYTHON_EXECUTABLE=/opt/python/cp314-cp314/bin/python\n\
        \  ;;\n3.14t)\n  PYTHON_EXECUTABLE=/opt/python/cp314-cp314t/bin/python\n \
        \ ;;\n*)\n  echo \"Unsupported python version ${PY_VERS}\"\n  exit 1\n  ;;\n\
        esac\n\nRELEASE=\"\"\nWITH_CLANG_LDD=\"\"\nif [[ \"${IS_RELEASE_TAG}\" ==\
        \ true ]]; then\n  RELEASE=\"--release\"\nfi\n\ndocker exec -t \"${container_name}\"\
        \ yum install -y zlib-devel zip\ndocker exec -t \"${container_name}\" \"${PYTHON_EXECUTABLE}\"\
        \  -m pip install -U setuptools==78.1.0 pybind11==3.0.1 auditwheel wheel\n\
        set +e\ndocker exec -t \"${container_name}\" command -v pip\nhas_pip=$?\n\
        set -e\nif [ $has_pip -eq 0 ] ; then\n    docker exec -t \"${container_name}\"\
        \ pip install -U cmake --force-reinstall\nelse\n    docker exec -t \"${container_name}\"\
        \ \"${PYTHON_EXECUTABLE}\"  -m pip install -U cmake --force-reinstall\nfi\n\
        \nif [[ (\"${{ matrix.device }}\" == \"cuda\" || \"${{ matrix.device }}\"\
        \ == \"rocm\" || \"${{ matrix.device }}\" == \"aarch64\" ) ]]; then\n  # With\
        \ this install, it gets clang 16.0.6.\n  docker exec -t \"${container_name}\"\
        \ dnf install clang lld -y\n  WITH_CLANG_LDD=\"--with-clang-ldd\"\nfi\n\n\
        docker exec -t \"${container_name}\" bash -c \"${PYTHON_EXECUTABLE} /pytorch/.github/scripts/build_triton_wheel.py\
        \ --device=$BUILD_DEVICE $RELEASE $WITH_CLANG_LDD\"\n\nif [[ (\"${{ matrix.device\
        \ }}\" == \"cuda\" || \"${{ matrix.device }}\" == \"xpu\") ]]; then\n  docker\
        \ exec -t \"${container_name}\"  bash -c \"auditwheel repair --plat ${PLATFORM}\
        \ --exclude libtriton.so //artifacts/*.whl\"\nelse\n  docker exec -t \"${container_name}\"\
        \  bash -c \"mkdir //artifacts/wheelhouse\"\n  docker exec -t \"${container_name}\"\
        \  bash -c \"mv //artifacts/*.whl //artifacts/wheelhouse/\"\nfi\ndocker exec\
        \ -t \"${container_name}\" chown -R 1000.1000 /artifacts/wheelhouse\n"
    - uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874
      with:
        name: triton-wheel-${{ matrix.py_vers }}-${{ matrix.device }}-${{ env.PLATFORM
          }}
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheelhouse/*
    - name: Teardown Linux
      uses: pytorch/test-infra/.github/actions/teardown-linux@main
      if: always()
  build-wheel-win:
    name: Build Triton Windows Wheel
    needs: get-label-type
    runs-on: ${{ needs.get-label-type.outputs.label-type }}windows.4xlarge
    strategy:
      fail-fast: false
      matrix:
        py_vers:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        - 3.14t
        device:
        - xpu
    timeout-minutes: 40
    env:
      PY_VERS: ${{ matrix.py_vers }}
      BUILD_DEVICE: ${{ matrix.device }}
      VC_INSTALL_PATH: C:\MSVC-BuildTools-2022
    steps:
    - name: Display EC2 information
      shell: bash
      run: "set -euo pipefail\nfunction get_ec2_metadata() {\n  # Pulled from instance\
        \ metadata endpoint for EC2\n  # see https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instancedata-data-retrieval.html\n\
        \  category=$1\n  curl -H \"X-aws-ec2-metadata-token: $(curl -s -X PUT \"\
        http://169.254.169.254/latest/api/token\" -H \"X-aws-ec2-metadata-token-ttl-seconds:\
        \ 30\")\" -fsSL \"http://169.254.169.254/latest/meta-data/${category}\"\n\
        }\necho \"ami-id: $(get_ec2_metadata ami-id)\"\necho \"instance-id: $(get_ec2_metadata\
        \ instance-id)\"\necho \"instance-type: $(get_ec2_metadata instance-type)\"\
        \necho \"system info $(uname -a)\"\n"
    - name: '[FB EMPLOYEES] Enable SSH (Click me for login details)'
      uses: pytorch/test-infra/.github/actions/setup-ssh@main
      continue-on-error: true
      with:
        github-secret: ${{ secrets.GITHUB_TOKEN }}
    - name: Enable git long paths and symlinks on Windows and disable fsmonitor daemon
      shell: bash
      run: 'git config --global core.longpaths true

        git config --global core.symlinks true

        # https://git-scm.com/docs/git-fsmonitor--daemon.  The daemon could lock

        # the directory on Windows and prevent GHA from checking out as reported

        # in https://github.com/actions/checkout/issues/1018

        git config --global core.fsmonitor false

        '
    - name: Checkout PyTorch
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha
          || github.sha }}
        submodules: false
        path: pytorch
        show-progress: false
    - name: Clean PyTorch checkout
      run: '# Remove any artifacts from the previous checkouts

        git clean -fxd

        '
      working-directory: pytorch
    - name: Enable long paths on Windows and install VS2022 17.13.2
      env:
        VC_YEAR: 2022
        VC_VERSION: 17.13.2
      shell: bash
      working-directory: pytorch
      run: 'powershell .github/scripts/windows/install_vs2022.ps1

        '
    - name: Build Triton wheel
      env:
        IS_RELEASE_TAG: ${{ startsWith(github.event.ref, 'refs/tags/v') }}
      working-directory: pytorch
      shell: bash
      run: "set -x\nexport RELEASE=\"\"\nif [[ \"${IS_RELEASE_TAG}\" == true ]]; then\n\
        \  export RELEASE=\"--release\"\nfi\n.github/scripts/windows/build_triton.bat\n\
        mkdir -p \"${RUNNER_TEMP}/artifacts/\"\nmv ./*.whl \"${RUNNER_TEMP}/artifacts/\"\
        \n"
    - uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874
      with:
        name: triton-wheel-${{ matrix.py_vers }}-${{ matrix.device }}
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/*
  upload-wheel:
    runs-on: ubuntu-22.04
    needs:
    - build-wheel
    - build-wheel-win
    permissions:
      id-token: write
      contents: read
    container:
      image: continuumio/miniconda3:4.12.0
    environment: ${{ (github.event_name == 'push' && github.event.ref == 'refs/heads/main')
      && 'nightly-wheel-upload' || '' }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Configure AWS credentials(PyTorch account) for main
      if: ${{ github.event_name == 'push' && github.event.ref == 'refs/heads/main'
        }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::749337293305:role/gha_workflow_nightly_build_wheels
        aws-region: us-east-1
    - name: Configure AWS credentials(PyTorch account) for RC builds
      if: ${{ github.event_name == 'push' &&  (startsWith(github.event.ref, 'refs/tags/')
        && !startsWith(github.event.ref, 'refs/tags/ciflow/')) }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::749337293305:role/gha_workflow_test_build_wheels
        aws-region: us-east-1
    - name: Download Build Artifacts
      uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e
      with:
        path: ${{ runner.temp }}/artifacts-all
    - name: Select Wheel Artifacts
      shell: bash
      run: 'set -x

        mkdir -p "${RUNNER_TEMP}/artifacts/"

        mv "${RUNNER_TEMP}"/artifacts-all/triton-wheel-*/* "${RUNNER_TEMP}/artifacts/"

        '
    - name: Set DRY_RUN (only for tagged pushes)
      if: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/main'
        || startsWith(github.event.ref, 'refs/tags/v')) }}
      shell: bash
      run: 'echo "DRY_RUN=disabled" >> "$GITHUB_ENV"

        '
    - name: Set UPLOAD_CHANNEL (only for tagged pushes)
      if: ${{ github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
        }}
      shell: bash
      run: "set -ex\n\n# reference ends with an RC suffix\nif [[ \"${GITHUB_REF_NAME}\"\
        \ = *-rc[0-9]* ]]; then\n  echo \"UPLOAD_CHANNEL=test\" >> \"$GITHUB_ENV\"\
        \nfi\n"
    - name: Upload binaries
      env:
        PACKAGE_TYPE: wheel
        UPLOAD_SUBFOLDER: ''
        PKG_DIR: ${{ runner.temp }}/artifacts
        R2_UPLOAD: ${{ (github.event_name == 'push' && github.event.ref == 'refs/heads/main')
          && 'true' || '' }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      shell: bash
      run: 'set -ex

        bash .ci/pytorch/binary_upload.sh

        '
