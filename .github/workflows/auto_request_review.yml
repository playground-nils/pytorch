name: Auto Request Review
'on':
  pull_request:
    types:
    - opened
    - ready_for_review
jobs:
  auto-request-review:
    if: ${{ !github.event.pull_request.head.repo.fork && github.repository_owner ==
      'playground-nils' }}
    permissions:
      contents: read
      pull-requests: write
    name: Auto Request Review
    runs-on: ubuntu-latest
    steps:
    - name: Request review based on files changes and/or groups the author belongs
        to
      uses: necojackarc/auto-request-review@e08cdffa277d50854744de3f76230260e61c67f4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
