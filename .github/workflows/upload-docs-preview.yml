name: Upload docs preview
'on':
  workflow_run:
    workflows:
    - pull
    types:
    - completed
permissions:
  id-token: write
  contents: read
  actions: read
jobs:
  upload-docs-preview:
    if: github.repository_owner == 'playground-nils' && github.event.workflow_run.event
      == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        docs_type:
        - python
        - cpp
    steps:
    - name: Download docs preview artifact
      id: download
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: docs-preview-osdc-${{ matrix.docs_type }}
        path: docs-preview-staging
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Read PR metadata
      if: steps.download.outcome == 'success'
      id: metadata
      shell: bash
      run: "set -ex\nif [ ! -f docs-preview-staging/pr-metadata.txt ]; then\n  echo\
        \ \"pr-metadata.txt missing from artifact, aborting.\"\n  exit 1\nfi\n# shellcheck\
        \ disable=SC1091\nsource docs-preview-staging/pr-metadata.txt\nif [ -z \"\
        ${PR_NUMBER:-}\" ]; then\n  echo \"PR_NUMBER is empty, aborting.\"\n  exit\
        \ 1\nfi\necho \"pr_number=${PR_NUMBER}\" >> \"${GITHUB_OUTPUT}\"\necho \"\
        docs_type=${DOCS_TYPE}\" >> \"${GITHUB_OUTPUT}\"\n"
    - name: Configure AWS credentials
      if: steps.download.outcome == 'success'
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::308535385114:role/arc
        aws-region: us-east-1
        role-session-name: docs-preview-uploader
    - name: Upload Python docs preview
      if: ${{ steps.download.outcome == 'success' && matrix.docs_type == 'python'
        }}
      env:
        PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
      run: 'aws s3 sync docs-preview-staging/content/ "s3://doc-previews/pytorch/pytorch/${PR_NUMBER}"
        --quiet

        '
    - name: Upload C++ docs preview
      if: ${{ steps.download.outcome == 'success' && matrix.docs_type == 'cpp' }}
      env:
        PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
      run: 'aws s3 sync docs-preview-staging/content/ "s3://doc-previews/pytorch/pytorch/${PR_NUMBER}/cppdocs"
        --quiet

        '
