name: inductor-perf-nightly-x86
'on':
  pull_request:
    paths:
    - .github/workflows/inductor-perf-test-nightly-x86.yml
  schedule:
  - cron: 0 7 * * *
  workflow_dispatch:
    inputs:
      training:
        description: Run training (off by default)?
        required: false
        type: boolean
        default: false
      inference:
        description: Run inference (on by default)?
        required: false
        type: boolean
        default: true
      default:
        description: Run inductor_default?
        required: false
        type: boolean
        default: true
      dynamic:
        description: Run inductor_dynamic_shapes?
        required: false
        type: boolean
        default: false
      cppwrapper:
        description: Run inductor_cpp_wrapper?
        required: false
        type: boolean
        default: false
      aotinductor:
        description: Run aot_inductor for inference?
        required: false
        type: boolean
        default: false
      freezing:
        description: Run freezing?
        required: false
        type: boolean
        default: true
      benchmark_configs:
        description: The list of configs used the benchmark
        required: false
        type: string
        default: inductor_huggingface_perf_cpu_x86,inductor_timm_perf_cpu_x86,inductor_torchbench_perf_cpu_x86
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}-${{ github.ref_type == 'branch'
    && github.sha }}-${{ github.event_name == 'schedule' }}
  cancel-in-progress: true
permissions:
  id-token: write
  contents: read
  actions: read
jobs:
  get-label-type:
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    if: ${{ (github.event_name != 'schedule' || github.repository == 'pytorch/pytorch')
      && github.repository_owner == 'playground-nils' }}
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login
        }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
      opt_out_experiments: lf
  inductor-build:
    name: inductor-build
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      build-environment: linux-jammy-py3.10-gcc11-build
      docker-image-name: ci-image:pytorch-linux-jammy-py3-gcc11-inductor-benchmarks
      test-matrix: "{ include: [\n  { config: \"inductor_huggingface_perf_cpu_x86\"\
        , shard: 1, num_shards: 3, runner: \"linux.24xl.spr-metal\" },\n  { config:\
        \ \"inductor_huggingface_perf_cpu_x86\", shard: 2, num_shards: 3, runner:\
        \ \"linux.24xl.spr-metal\" },\n  { config: \"inductor_huggingface_perf_cpu_x86\"\
        , shard: 3, num_shards: 3, runner: \"linux.24xl.spr-metal\" },\n  { config:\
        \ \"inductor_timm_perf_cpu_x86\", shard: 1, num_shards: 5, runner: \"linux.24xl.spr-metal\"\
        \ },\n  { config: \"inductor_timm_perf_cpu_x86\", shard: 2, num_shards: 5,\
        \ runner: \"linux.24xl.spr-metal\" },\n  { config: \"inductor_timm_perf_cpu_x86\"\
        , shard: 3, num_shards: 5, runner: \"linux.24xl.spr-metal\" },\n  { config:\
        \ \"inductor_timm_perf_cpu_x86\", shard: 4, num_shards: 5, runner: \"linux.24xl.spr-metal\"\
        \ },\n  { config: \"inductor_timm_perf_cpu_x86\", shard: 5, num_shards: 5,\
        \ runner: \"linux.24xl.spr-metal\" },\n  { config: \"inductor_torchbench_perf_cpu_x86\"\
        , shard: 1, num_shards: 4, runner: \"linux.24xl.spr-metal\" },\n  { config:\
        \ \"inductor_torchbench_perf_cpu_x86\", shard: 2, num_shards: 4, runner: \"\
        linux.24xl.spr-metal\" },\n  { config: \"inductor_torchbench_perf_cpu_x86\"\
        , shard: 3, num_shards: 4, runner: \"linux.24xl.spr-metal\" },\n  { config:\
        \ \"inductor_torchbench_perf_cpu_x86\", shard: 4, num_shards: 4, runner: \"\
        linux.24xl.spr-metal\" },\n]}\n"
      selected-test-configs: ${{ inputs.benchmark_configs }}
      build-additional-packages: vision audio torchao
    secrets: inherit
  inductor-test-nightly-freezing:
    name: inductor-test-nightly-freezing
    uses: ./.github/workflows/_linux-test.yml
    needs: inductor-build
    if: github.event.schedule == '0 7 * * *'
    with:
      build-environment: ${{ needs.inductor-build.outputs.build-environment }}
      dashboard-tag: training-false-inference-true-default-true-dynamic-true-cppwrapper-true-aotinductor-true-freezing-true
      docker-image: ${{ needs.inductor-build.outputs.docker-image }}
      test-matrix: ${{ needs.inductor-build.outputs.test-matrix }}
      timeout-minutes: 720
      disable-monitor: false
      monitor-log-interval: 15
      monitor-data-collect-interval: 4
    secrets: inherit
  inductor-test:
    name: inductor-test
    uses: ./.github/workflows/_linux-test.yml
    needs: inductor-build
    if: github.event_name == 'workflow_dispatch'
    with:
      build-environment: ${{ needs.inductor-build.outputs.build-environment }}
      dashboard-tag: training-${{ inputs.training }}-inference-${{ inputs.inference
        }}-default-${{ inputs.default }}-dynamic-${{ inputs.dynamic }}-cppwrapper-${{
        inputs.cppwrapper }}-aotinductor-${{ inputs.aotinductor }}-freezing-${{ inputs.freezing
        }}
      docker-image: ${{ needs.inductor-build.outputs.docker-image }}
      test-matrix: ${{ needs.inductor-build.outputs.test-matrix }}
      timeout-minutes: 720
      disable-monitor: false
      monitor-log-interval: 15
      monitor-data-collect-interval: 4
    secrets: inherit
