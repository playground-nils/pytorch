name: linux-test
'on':
  workflow_call:
    inputs:
      build-environment:
        required: true
        type: string
        description: Top-level label for what's being built/tested.
      test-matrix:
        required: true
        type: string
        description: JSON description of what test configs to run.
      test-matrix-osdc:
        required: false
        type: string
        default: ''
        description: 'OSDC-remapped test matrix used by the test-osdc job during the

          shadow-mode experiment (issue #183242). Falls back to test-matrix

          when empty so OSDC-only callers keep working unchanged.

          '
      docker-image:
        required: true
        type: string
        description: Docker image to run in.
      sync-tag:
        required: false
        type: string
        default: ''
        description: 'If this is set, our linter will use this to make sure that every
          other

          job with the same `sync-tag` is identical.

          '
      timeout-minutes:
        required: false
        type: number
        default: 240
        description: 'Set the maximum (in minutes) how long the workflow should take
          to finish

          '
      tests-to-include:
        required: false
        type: string
        default: ''
        description: Space-separated tests to include (empty string implies default
          list)
      use-gha:
        required: false
        type: string
        default: ''
        description: If set to any value, upload to GHA. Otherwise upload to S3.
      dashboard-tag:
        required: false
        type: string
        default: ''
      s3-bucket:
        description: S3 bucket to download artifact
        required: false
        type: string
        default: gha-artifacts
      aws-role-to-assume:
        description: role to assume for downloading artifacts
        required: false
        type: string
        default: ''
      disable-monitor:
        description: '[Experimental] Disable utilization monitoring for tests.

          Currently, by default we disable the monitor job and only look for specific
          tests,

          since we are investigating the behaviour of the monitor script with different
          tests.

          '
        required: false
        type: boolean
        default: false
      monitor-log-interval:
        description: 'Set the interval for the monitor script to log utilization.

          '
        required: false
        type: number
        default: 5
      monitor-data-collect-interval:
        description: 'Set the interval for the monitor script to collect data.

          '
        required: false
        type: number
        default: 1
      use-arc:
        required: false
        type: boolean
        default: false
        description: If true, use ARC (OSDC) runner path instead of EC2.
      python-version:
        required: false
        type: string
        default: ''
        description: Python version to use for the OSDC test.
      compiler:
        required: false
        type: string
        default: ''
        description: Compiler to use for the OSDC test.
      cuda-version:
        required: false
        type: string
        default: ''
        description: CUDA version to use for the OSDC test.
      export-profiler-trace:
        description: 'If set to "1", export Chrome profiler traces from performance
          benchmarks.

          '
        required: false
        type: string
        default: ''
      enable-torch-trace:
        description: 'If set to "1", enable TORCH_TRACE structured logging and collect
          tlparse output.

          '
        required: false
        type: string
        default: ''
    secrets:
      HUGGING_FACE_HUB_TOKEN:
        required: false
        description: 'HF Auth token to avoid rate limits when downloading models or
          datasets from hub

          '
      VLLM_TEST_HUGGING_FACE_TOKEN:
        required: false
        description: 'HF Auth token to test vllm

          '
      SCRIBE_GRAPHQL_ACCESS_TOKEN:
        required: false
        description: 'FB app token to write to scribe endpoint

          '
env:
  GIT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
jobs:
  test:
    if: github.repository_owner == 'playground-nils' && toJSON(fromJSON(inputs.test-matrix).include)
      != '[]' && (!inputs.use-arc || github.event_name == 'pull_request' || startsWith(github.ref,
      'refs/tags/ciflow/'))
    strategy:
      matrix: ${{ fromJSON(inputs.test-matrix) }}
      fail-fast: false
    environment: ${{ github.ref == 'refs/heads/main' && 'scribe-protected' || startsWith(github.ref,
      'refs/heads/release/') && 'scribe-protected' || contains(github.event.pull_request.labels.*.name,
      'ci-scribe') && 'scribe-pr' || '' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.mem_leak_check == 'mem_leak_check' && 600 || inputs.timeout-minutes
      }}
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Setup SSH (Click me for login details)
      uses: pytorch/test-infra/.github/actions/setup-ssh@main
      if: ${{ !contains(matrix.runner, 'b200') && inputs.build-environment != 'linux-s390x-binary-manywheel'
        }}
      with:
        github-secret: ${{ secrets.GITHUB_TOKEN }}
        instructions: "All testing is done inside the container, to start an interactive\
          \ session run:\n  docker exec -it $(docker container ps --format '{{.ID}}')\
          \ bash\n"
    - name: Setup Linux
      id: setup-linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        python-version: ${{ inputs.python-version }}
        compiler: ${{ inputs.compiler }}
        cuda-version: ${{ inputs.cuda-version }}
        submodules: 'false'
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Check TPU Availability
      id: check-tpu
      uses: ./.github/actions/check-tpu
      if: inputs.build-environment != 'linux-s390x-binary-manywheel' && !contains(matrix.runner,
        'b200')
    - name: Setup TPU docker flags
      id: setup-tpu-flags
      if: steps.check-tpu.outputs.has_tpu == 'true'
      shell: bash
      run: echo "TPU_DOCKER_FLAGS=--privileged --network=host -e PJRT_DEVICE=TPU -e
        TPU_SKIP_MDS_QUERY -e TPU_TOPOLOGY -e TPU_WORKER_ID -e TPU_TOPOLOGY_WRAP -e
        TPU_CHIPS_PER_HOST_BOUNDS -e TPU_ACCELERATOR_TYPE -e TPU_RUNTIME_METRICS_PORTS
        -e TPU_TOPOLOGY_ALT -e HOST_BOUNDS -e TPU_HOST_BOUNDS -e VBAR_CONTROL_SERVICE_URL
        -e CHIPS_PER_HOST_BOUNDS -e TPU_WORKER_HOSTNAMES" >> "$GITHUB_ENV"
    - name: Login to ECR
      if: inputs.build-environment != 'linux-s390x-binary-manywheel'
      uses: ./.github/actions/ecr-login
      with:
        aws-role-to-assume: ${{ inputs.aws-role-to-assume }}
    - name: Calculate docker image
      id: calculate-docker-image
      uses: pytorch/test-infra/.github/actions/calculate-docker-image@main
      if: inputs.build-environment != 'linux-s390x-binary-manywheel'
      with:
        docker-image-name: ${{ inputs.docker-image }}
    - name: Use following to pull public copy of the image
      id: print-ghcr-mirror
      if: inputs.build-environment != 'linux-s390x-binary-manywheel'
      env:
        ECR_DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
      shell: bash
      run: 'tag=${ECR_DOCKER_IMAGE##*:}

        echo "docker pull ghcr.io/pytorch/ci-image:${tag/:/-}"

        '
    - name: Pull docker image
      uses: pytorch/test-infra/.github/actions/pull-docker-image@main
      if: inputs.build-environment != 'linux-s390x-binary-manywheel'
      with:
        docker-image: ${{ steps.calculate-docker-image.outputs.docker-image }}
    - name: Check if in a container runner
      shell: bash
      id: check_container_runner
      run: echo "IN_CONTAINER_RUNNER=$(if [ -f /.inarc ] || [ -f /.incontainer ];
        then echo true ; else echo false; fi)" >> "$GITHUB_OUTPUT"
    - name: Install nvidia driver, nvidia-docker runtime, set GPU_FLAG
      id: install-nvidia-driver
      uses: pytorch/test-infra/.github/actions/setup-nvidia@main
      with:
        driver-version: 580.82.07
      if: ${{ !contains(matrix.runner, 'b200') }}
    - name: Setup GPU_FLAG for docker run
      id: setup-gpu-flag
      run: echo "GPU_FLAG=--gpus all -e NVIDIA_DRIVER_CAPABILITIES=all" >> "${GITHUB_ENV}"
      if: ${{ steps.install-nvidia-driver.outputs.has-nvidia == 'true' || contains(matrix.runner,
        'b200') }}
    - name: Setup SCCACHE_SERVER_PORT environment for docker run when on container
      id: setup-sscache-port-flag
      run: echo "SCCACHE_SERVER_PORT_DOCKER_FLAG=-e SCCACHE_SERVER_PORT=$((RUNNER_UID
        + 4226))" >> "${GITHUB_ENV}"
      if: ${{ steps.check_container_runner.outputs.IN_CONTAINER_RUNNER == 'true' &&
        !contains(matrix.runner, 'b200') }}
    - name: Start monitoring script
      id: monitor-script
      if: ${{ !inputs.disable-monitor }}
      shell: bash
      continue-on-error: true
      env:
        JOB_ID: ${{ steps.setup-linux.outputs.job-id }}
        JOB_NAME: ${{ steps.setup-linux.outputs.job-name }}
        WORKFLOW_NAME: ${{ github.workflow }}
        WORKFLOW_RUN_ID: ${{github.run_id}}
        MONITOR_LOG_INTERVAL: ${{ inputs.monitor-log-interval }}
        MONITOR_DATA_COLLECT_INTERVAL: ${{ inputs.monitor-data-collect-interval }}
      run: 'uv run --no-project --with psutil==5.9.8 --with dataclasses_json==0.6.7
        --with nvidia-ml-py==11.525.84 python -m tools.stats.monitor --log-interval
        "$MONITOR_LOG_INTERVAL" --data-collect-interval "$MONITOR_DATA_COLLECT_INTERVAL"
        > usage_log.txt 2>&1 &

        echo "monitor-script-pid=${!}" >> "${GITHUB_OUTPUT}"

        '
    - name: Download build artifacts
      uses: ./.github/actions/download-build-artifacts
      with:
        name: ${{ inputs.build-environment }}
        s3-bucket: ${{ inputs.s3-bucket }}
        use-gha: ${{ inputs.use-gha }}
    - name: Download TD artifacts
      continue-on-error: true
      uses: ./.github/actions/download-td-artifacts
    - name: Download Windows torch wheel for cross-compilation
      if: matrix.win_torch_wheel_artifact != ''
      uses: seemethere/download-artifact-s3@1da556a7aa0a088e3153970611f6c432d58e80e6
      with:
        name: ${{ matrix.win_torch_wheel_artifact }}
        path: win-torch-wheel
    - name: Extract Windows wheel and setup CUDA libraries
      if: matrix.win_torch_wheel_artifact != ''
      shell: bash
      run: "set -x\n\n# Find the wheel file\nWHEEL_FILE=$(find win-torch-wheel -name\
        \ \"*.whl\" -type f | head -n 1)\nif [ -z \"$WHEEL_FILE\" ]; then\n  echo\
        \ \"Error: No wheel file found in win-torch-wheel directory\"\n  exit 1\n\
        fi\necho \"Found wheel file: $WHEEL_FILE\"\n\n# Unzip the wheel file\nunzip\
        \ -q \"$WHEEL_FILE\" -d win-torch-wheel-extracted\necho \"Extracted wheel\
        \ contents\"\n\n# Setup CUDA libraries (cuda.lib and cudart.lib) directory\n\
        mkdir -p win-torch-wheel-extracted/lib/x64\nif [ -f \"win-torch-wheel/cuda.lib\"\
        \ ]; then\n  mv win-torch-wheel/cuda.lib win-torch-wheel-extracted/lib/x64/\n\
        \  echo \"Moved cuda.lib to win-torch-wheel-extracted/lib/x64/\"\nfi\nif [\
        \ -f \"win-torch-wheel/cudart.lib\" ]; then\n  mv win-torch-wheel/cudart.lib\
        \ win-torch-wheel-extracted/lib/x64/\n  echo \"Moved cudart.lib to win-torch-wheel-extracted/lib/x64/\"\
        \nfi\n\n# Setup CUDA runtime DLL (needed for MinGW import lib generation on\
        \ CUDA 13.0+)\nmkdir -p win-torch-wheel-extracted/bin/x64\nfor dll in win-torch-wheel/cudart64_*.dll;\
        \ do\n  if [ -f \"$dll\" ]; then\n    mv \"$dll\" win-torch-wheel-extracted/bin/x64/\n\
        \    echo \"Moved $(basename $dll) to win-torch-wheel-extracted/bin/x64/\"\
        \n  fi\ndone\n\n# Verify CUDA libraries and DLLs are present\necho \"CUDA\
        \ libraries:\"\nls -la win-torch-wheel-extracted/lib/x64/ || echo \"No CUDA\
        \ libraries found\"\necho \"CUDA DLLs:\"\nls -la win-torch-wheel-extracted/bin/x64/\
        \ || echo \"No CUDA DLLs found\"\n"
    - name: Check for keep-going label and re-enabled test issues
      id: keep-going
      uses: ./.github/actions/filter-test-configs
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        test-matrix: ${{ inputs.test-matrix }}
        job-name: ${{ steps.setup-linux.outputs.job-name }}
    - name: Set Test step time
      id: test-timeout
      shell: bash
      env:
        JOB_TIMEOUT: ${{ matrix.mem_leak_check == 'mem_leak_check' && 600 || inputs.timeout-minutes
          }}
      run: 'echo "timeout=$((JOB_TIMEOUT-30))" >> "${GITHUB_OUTPUT}"

        '
    - name: Preserve github env variables for use in docker
      shell: bash
      run: 'env | grep ''^GITHUB'' >> "/tmp/github_env_${GITHUB_RUN_ID}"

        env | grep ''^CI'' >> "/tmp/github_env_${GITHUB_RUN_ID}"

        '
    - name: Authenticate with AWS
      if: ${{ contains(matrix.runner, 'b200') || steps.check-tpu.outputs.has_tpu ==
        'true' }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_upload-benchmark-results
        role-duration-seconds: 18000
        aws-region: us-east-1
    - name: Test
      id: test
      timeout-minutes: ${{ fromJson(steps.test-timeout.outputs.timeout) }}
      env:
        BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        GITHUB_JOB: ${{ github.job }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        JOB_ID: ${{ steps.setup-linux.outputs.job-id }}
        JOB_NAME: ${{ steps.setup-linux.outputs.job-name }}
        BRANCH: ${{ steps.setup-linux.outputs.branch }}
        SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        TEST_CONFIG: ${{ matrix.config }}
        SHARD_NUMBER: ${{ matrix.shard }}
        NUM_TEST_SHARDS: ${{ matrix.num_shards }}
        EXTRA_FLAGS: ${{ matrix.extra_flags || '' }}
        OP_BENCHMARK_TESTS: ${{ matrix.op_benchmark_tests }}
        REENABLED_ISSUES: ${{ steps.keep-going.outputs.reenabled-issues }}
        CONTINUE_THROUGH_ERROR: ${{ steps.keep-going.outputs.keep-going }}
        VERBOSE_TEST_LOGS: ${{ steps.keep-going.outputs.ci-verbose-test-logs }}
        TEST_SHOWLOCALS: ${{ steps.keep-going.outputs.ci-test-showlocals }}
        NO_TEST_TIMEOUT: ${{ steps.keep-going.outputs.ci-no-test-timeout }}
        NO_TD: ${{ steps.keep-going.outputs.ci-no-td }}
        TD_DISTRIBUTED: ${{ steps.keep-going.outputs.ci-td-distributed }}
        SCCACHE_BUCKET: ${{ !contains(matrix.runner, 'b200') && 'ossci-compiler-cache-circleci-v2'
          || '' }}
        SCCACHE_REGION: ${{ !contains(matrix.runner, 'b200') && 'us-east-1' || ''
          }}
        SHM_SIZE: ${{ steps.install-nvidia-driver.outputs.has-nvidia == 'true' &&
          '2g' || '1g' }}
        DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
        DOCKER_IMAGE_S390X: ${{ inputs.docker-image }}
        XLA_CUDA: ${{ contains(inputs.build-environment, 'xla') && '0' || '' }}
        XLA_CLANG_CACHE_S3_BUCKET_NAME: ossci-compiler-clang-cache-circleci-xla
        PYTORCH_TEST_CUDA_MEM_LEAK_CHECK: ${{ matrix.mem_leak_check && '1' || '0'
          }}
        PYTORCH_TEST_RERUN_DISABLED_TESTS: ${{ matrix.rerun_disabled_tests && '1'
          || '0' }}
        TESTS_TO_INCLUDE: ${{ inputs.tests-to-include }}
        DASHBOARD_TAG: ${{ inputs.dashboard-tag }}
        EXPORT_PROFILER_TRACE: ${{ inputs.export-profiler-trace }}
        ENABLE_TORCH_TRACE: ${{ inputs.enable-torch-trace }}
        VLLM_TEST_HUGGING_FACE_TOKEN: ${{ secrets.VLLM_TEST_HUGGING_FACE_TOKEN }}
        HF_CACHE: /mnt/hf_cache
        TRANSFORMERS_OFFLINE: ${{ (github.event_name == 'schedule' || github.event_name
          == 'workflow_dispatch' || contains(steps.keep-going.outputs.labels, 'ci-refresh-hf-cache'))
          && '0' || '1' }}
        HF_DATASETS_OFFLINE: ${{ (github.event_name == 'schedule' || github.event_name
          == 'workflow_dispatch' || contains(steps.keep-going.outputs.labels, 'ci-refresh-hf-cache'))
          && '0' || '1' }}
        HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.SCRIBE_GRAPHQL_ACCESS_TOKEN }}
        ARTIFACTS_FILE_SUFFIX: ${{ github.job }}-${{ matrix.config }}-${{ matrix.shard
          }}-${{ matrix.num_shards }}-${{ matrix.runner }}_${{ steps.setup-linux.outputs.job-id
          }}
        TORCH_TPU: ${{ steps.check-tpu.outputs.has_tpu == 'true' && '1' || '' }}
        TORCH_TPU_TEXT_FILE: /var/lib/jenkins/workspace/.github/ci_commit_pins/torch_tpu.txt
      run: "set -x\n\nif [[ $TEST_CONFIG == 'multigpu' ]]; then\n  TEST_COMMAND=.ci/pytorch/multigpu-test.sh\n\
        else\n  TEST_COMMAND=.ci/pytorch/test.sh\nfi\n\n# Leaving 1GB for the runner\
        \ and other things\nTOTAL_AVAILABLE_MEMORY_IN_GB=$(awk '/MemTotal/ { printf\
        \ \"%.3f \\n\", $2/1024/1024 - 1 }' /proc/meminfo)\n# https://docs.docker.com/engine/containers/resource_constraints/#--memory-swap-details,\
        \ the 3GB swap\n# comes from https://github.com/pytorch/test-infra/pull/6058\n\
        TOTAL_MEMORY_WITH_SWAP=$((\"${TOTAL_AVAILABLE_MEMORY_IN_GB%.*}\" + 3))\n\n\
        if [[ ${BUILD_ENVIRONMENT} == *\"s390x\"* ]]; then\n  SHM_OPTS=\n  JENKINS_USER=\n\
        \  # ensure that docker container cleanly exits in 12 hours\n  # if for some\
        \ reason cleanup action doesn't stop container\n  # when job is cancelled\n\
        \  DOCKER_SHELL_CMD=\"sleep 12h\"\n  USED_IMAGE=\"${DOCKER_IMAGE_S390X}\"\n\
        else\n  SHM_OPTS=\"--shm-size=${SHM_SIZE}\"\n  JENKINS_USER=\"--user jenkins\"\
        \n  DOCKER_SHELL_CMD=\n  USED_IMAGE=\"${DOCKER_IMAGE}\"\nfi\n\n# Just create\
        \ an empty HF_CACHE dir if it doesn't exist. This dir is not\n# used for anything\
        \ besides vLLM jobs\nif [[ ! -d \"${HF_CACHE}\" ]]; then\n  export HF_CACHE=\"\
        ${RUNNER_TEMP}/hf_cache\"\n  mkdir -p \"${HF_CACHE}\"\n\n  # When there is\
        \ no cache directory, e.g. benchmark, the job has no\n  # way but to reach\
        \ out to HF if needed\n  export TRANSFORMERS_OFFLINE=0\n  export HF_DATASETS_OFFLINE=0\n\
        fi\n\n# detached container should get cleaned up by teardown_ec2_linux\n#\
        \ TODO: Stop building test binaries as part of the build phase\n# Used for\
        \ GPU_FLAG, SHM_OPTS, JENKINS_USER and DOCKER_SHELL_CMD since that doesn't\
        \ play nice\n# shellcheck disable=SC2086,SC2090\ncontainer_name=$(docker run\
        \ \\\n  ${GPU_FLAG:-} \\\n  ${SCCACHE_SERVER_PORT_DOCKER_FLAG:-} \\\n  -e\
        \ BUILD_ENVIRONMENT \\\n  -e PR_NUMBER \\\n  -e GITHUB_ACTIONS \\\n  -e GITHUB_REPOSITORY\
        \ \\\n  -e GITHUB_WORKFLOW \\\n  -e GITHUB_JOB \\\n  -e GITHUB_RUN_ID \\\n\
        \  -e GITHUB_RUN_NUMBER \\\n  -e GITHUB_RUN_ATTEMPT \\\n  -e JOB_ID \\\n \
        \ -e JOB_NAME \\\n  -e BASE_SHA \\\n  -e BRANCH \\\n  -e SHA1 \\\n  -e AWS_DEFAULT_REGION\
        \ \\\n  -e AWS_ACCESS_KEY_ID \\\n  -e AWS_SECRET_ACCESS_KEY \\\n  -e AWS_SESSION_TOKEN\
        \ \\\n  -e IN_WHEEL_TEST \\\n  -e SHARD_NUMBER \\\n  -e TEST_CONFIG \\\n \
        \ -e NUM_TEST_SHARDS \\\n  -e REENABLED_ISSUES \\\n  -e CONTINUE_THROUGH_ERROR\
        \ \\\n  -e VERBOSE_TEST_LOGS \\\n  -e TEST_SHOWLOCALS \\\n  -e NO_TEST_TIMEOUT\
        \ \\\n  -e NO_TD \\\n  -e TD_DISTRIBUTED \\\n  -e PR_LABELS \\\n  -e MAX_JOBS=\"\
        $(nproc --ignore=2)\" \\\n  -e SCCACHE_BUCKET \\\n  -e SCCACHE_REGION \\\n\
        \  -e XLA_CUDA \\\n  -e XLA_CLANG_CACHE_S3_BUCKET_NAME \\\n  -e PYTORCH_TEST_CUDA_MEM_LEAK_CHECK\
        \ \\\n  -e PYTORCH_TEST_RERUN_DISABLED_TESTS \\\n  -e TESTS_TO_INCLUDE \\\n\
        \  -e SKIP_SCCACHE_INITIALIZATION=1 \\\n  -e HUGGING_FACE_HUB_TOKEN \\\n \
        \ -e VLLM_TEST_HUGGING_FACE_TOKEN \\\n  -e HF_CACHE \\\n  -e TRANSFORMERS_OFFLINE\
        \ \\\n  -e HF_DATASETS_OFFLINE \\\n  -e SCRIBE_GRAPHQL_ACCESS_TOKEN \\\n \
        \ -e DASHBOARD_TAG \\\n  -e EXPORT_PROFILER_TRACE \\\n  -e ENABLE_TORCH_TRACE\
        \ \\\n  -e ARTIFACTS_FILE_SUFFIX \\\n  -e TORCH_TPU \\\n  -e TORCH_TPU_TEXT_FILE\
        \ \\\n  ${TPU_DOCKER_FLAGS:-} \\\n  --memory=\"${TOTAL_AVAILABLE_MEMORY_IN_GB%.*}g\"\
        \ \\\n  --memory-swap=\"${TOTAL_MEMORY_WITH_SWAP}g\" \\\n  --env-file=\"/tmp/github_env_${GITHUB_RUN_ID}\"\
        \ \\\n  --security-opt seccomp=unconfined \\\n  --cap-add=SYS_PTRACE \\\n\
        \  --ipc=host \\\n  ${SHM_OPTS} \\\n  --tty \\\n  --detach \\\n  --name=\"\
        ${container_name}\" \\\n  ${JENKINS_USER} \\\n  -v \"${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace\"\
        \ \\\n  -v \"${HF_CACHE}:${HF_CACHE}\" \\\n  -w /var/lib/jenkins/workspace\
        \ \\\n  \"${USED_IMAGE}\" \\\n  ${DOCKER_SHELL_CMD}\n)\necho \"DOCKER_CONTAINER_ID=${container_name}\"\
        \ >> \"${GITHUB_ENV}\"\n\nif [[ ${BUILD_ENVIRONMENT} == *\"s390x\"* ]]; then\n\
        \  # sometimes there are intermittent network errors, do a couple of retries\n\
        \  docker exec -t \"${container_name}\" sh -c \"python3 -m pip install -r\
        \ .ci/docker/requirements-ci.txt || \\\n    (sleep 15 && python3 -m pip install\
        \ -r .ci/docker/requirements-ci.txt) || \\\n    (sleep 30 && python3 -m pip\
        \ install -r .ci/docker/requirements-ci.txt) || \\\n    (sleep 60 && python3\
        \ -m pip install -r .ci/docker/requirements-ci.txt) || \\\n    (sleep 300\
        \ && python3 -m pip install -r .ci/docker/requirements-ci.txt)\"\nfi\n\ndocker\
        \ exec -t \"${container_name}\" sh -c \"python3 -m pip install $(echo dist/*.whl)[opt-einsum]\
        \ && (if [ -n \\\"\\$TORCH_TPU\\\" ] && [ -f .ci/docker/common/install_torch_tpu.sh\
        \ ]; then bash .ci/docker/common/install_torch_tpu.sh; fi) && ${TEST_COMMAND}\"\
        \n"
    - name: Upload pytest cache if tests failed
      uses: ./.github/actions/pytest-cache-upload
      continue-on-error: true
      if: failure() && steps.test.conclusion && steps.test.conclusion == 'failure'
        && inputs.build-environment != 'linux-s390x-binary-manywheel'
      with:
        cache_dir: .pytest_cache
        shard: ${{ matrix.shard }}
        sha: ${{ github.event.pull_request.head.sha || github.sha }}
        test_config: ${{ matrix.config }}
        job_identifier: ${{ github.workflow }}_${{ inputs.build-environment }}
    - name: Authenticate with AWS
      if: ${{ always() && contains(matrix.runner, 'b200') }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_upload-benchmark-results
        role-duration-seconds: 18000
        aws-region: us-east-1
    - name: Upload the benchmark results
      uses: pytorch/test-infra/.github/actions/upload-benchmark-results@main
      if: inputs.build-environment != 'linux-s390x-binary-manywheel' && steps.check-tpu.outputs.has_tpu
        != 'true'
      with:
        benchmark-results-dir: test/test-reports
        dry-run: false
        schema-version: v3
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Print remaining test logs
      shell: bash
      if: always() && steps.test.conclusion
      run: 'cat test/**/*_toprint.log || true

        '
    - name: Stop monitoring script
      if: ${{ always() && steps.monitor-script.outputs.monitor-script-pid }}
      shell: bash
      continue-on-error: true
      env:
        MONITOR_SCRIPT_PID: ${{ steps.monitor-script.outputs.monitor-script-pid }}
      run: 'kill "$MONITOR_SCRIPT_PID"

        '
    - name: Upload test artifacts
      uses: ./.github/actions/upload-test-artifacts
      if: always() && steps.test.conclusion && steps.test.conclusion != 'skipped'
      with:
        file-suffix: ${{ github.job }}-${{ matrix.config }}-${{ matrix.shard }}-${{
          matrix.num_shards }}-${{ matrix.runner }}_${{ steps.setup-linux.outputs.job-id
          }}
        use-gha: ${{ inputs.use-gha }}
        s3-bucket: ${{ inputs.s3-bucket }}
    - name: Collect backtraces from coredumps (if any)
      if: always()
      run: '# shellcheck disable=SC2156

        find . -iname "core.[1-9]*" -exec docker exec "${DOCKER_CONTAINER_ID}" sh
        -c "gdb python {} -ex ''bt'' -ex ''q''" \;

        '
    - name: Store Core dumps on S3
      uses: seemethere/upload-artifact-s3@baba72d0712b404f646cebe0730933554ebce96a
      if: failure()
      with:
        name: coredumps-${{ matrix.config }}-${{ matrix.shard }}-${{ matrix.num_shards
          }}-${{ matrix.runner }}
        retention-days: 14
        if-no-files-found: ignore
        path: ./**/core.[1-9]*
    - name: Upload utilization stats
      if: ${{ always() && steps.test.conclusion && steps.test.conclusion != 'skipped'
        && !inputs.disable-monitor && inputs.build-environment != 'linux-s390x-binary-manywheel'
        }}
      continue-on-error: true
      uses: ./.github/actions/upload-utilization-stats
      with:
        job_id: ${{ steps.setup-linux.outputs.job-id }}
        job_name: ${{ steps.setup-linux.outputs.job-name }}
        workflow_name: ${{ github.workflow }}
        workflow_run_id: ${{github.run_id}}
        workflow_attempt: ${{github.run_attempt}}
    - name: Teardown Linux
      uses: pytorch/test-infra/.github/actions/teardown-linux@main
      if: always() && steps.check_container_runner.outputs.IN_CONTAINER_RUNNER ==
        'false'
    - name: Cleanup docker
      if: always() && inputs.build-environment == 'linux-s390x-binary-manywheel'
      shell: bash
      run: '# on s390x stop the container for clean worker stop

        docker stop -a || true

        docker kill -a || true

        '
  test-osdc:
    if: github.repository_owner == 'playground-nils' && toJSON(fromJSON(inputs.test-matrix-osdc
      != '' && inputs.test-matrix-osdc || inputs.test-matrix).include) != '[]' &&
      inputs.use-arc
    strategy:
      matrix: ${{ fromJSON(inputs.test-matrix-osdc != '' && inputs.test-matrix-osdc
        || inputs.test-matrix) }}
      fail-fast: false
    environment: ${{ github.ref == 'refs/heads/main' && 'scribe-protected' || startsWith(github.ref,
      'refs/heads/release/') && 'scribe-protected' || contains(github.event.pull_request.labels.*.name,
      'ci-scribe') && 'scribe-pr' || '' }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ inputs.docker-image }}
      options: --gpus all
    timeout-minutes: ${{ matrix.mem_leak_check == 'mem_leak_check' && 600 || inputs.timeout-minutes
      }}
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
    - name: Setup Linux
      id: setup-linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
      with:
        use-arc: true
        python-version: ${{ inputs.python-version }}
        compiler: ${{ inputs.compiler }}
        cuda-version: ${{ inputs.cuda-version }}
        submodules: 'false'
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Configure AWS credentials
      id: aws-creds
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
      with:
        role-to-assume: arn:aws:iam::308535385114:role/arc
        aws-region: us-east-1
        role-duration-seconds: 18000
    - name: Download build artifacts
      uses: pytorch/pytorch/.github/actions/download-build-artifacts@main
      with:
        name: ${{ inputs.build-environment }}
        s3-bucket: ${{ inputs.s3-bucket }}
        use-gha: ${{ steps.aws-creds.outcome != 'success' || inputs.use-gha }}
    - name: Download TD artifacts
      continue-on-error: true
      uses: pytorch/pytorch/.github/actions/download-td-artifacts@main
      with:
        use-gha: ${{ steps.aws-creds.outcome != 'success' || inputs.use-gha }}
    - name: Download Windows torch wheel for cross-compilation
      if: matrix.win_torch_wheel_artifact != ''
      uses: seemethere/download-artifact-s3@1da556a7aa0a088e3153970611f6c432d58e80e6
      with:
        name: ${{ matrix.win_torch_wheel_artifact }}
        path: win-torch-wheel
    - name: Extract Windows wheel and setup CUDA libraries
      if: matrix.win_torch_wheel_artifact != ''
      shell: bash
      run: "set -x\n\n# Find the wheel file\nWHEEL_FILE=$(find win-torch-wheel -name\
        \ \"*.whl\" -type f | head -n 1)\nif [ -z \"$WHEEL_FILE\" ]; then\n  echo\
        \ \"Error: No wheel file found in win-torch-wheel directory\"\n  exit 1\n\
        fi\necho \"Found wheel file: $WHEEL_FILE\"\n\n# Unzip the wheel file\nunzip\
        \ -q \"$WHEEL_FILE\" -d win-torch-wheel-extracted\necho \"Extracted wheel\
        \ contents\"\n\n# Setup CUDA libraries (cuda.lib and cudart.lib) directory\n\
        mkdir -p win-torch-wheel-extracted/lib/x64\nif [ -f \"win-torch-wheel/cuda.lib\"\
        \ ]; then\n  mv win-torch-wheel/cuda.lib win-torch-wheel-extracted/lib/x64/\n\
        \  echo \"Moved cuda.lib to win-torch-wheel-extracted/lib/x64/\"\nfi\nif [\
        \ -f \"win-torch-wheel/cudart.lib\" ]; then\n  mv win-torch-wheel/cudart.lib\
        \ win-torch-wheel-extracted/lib/x64/\n  echo \"Moved cudart.lib to win-torch-wheel-extracted/lib/x64/\"\
        \nfi\n\n# Setup CUDA runtime DLL (needed for MinGW import lib generation on\
        \ CUDA 13.0+)\nmkdir -p win-torch-wheel-extracted/bin/x64\nfor dll in win-torch-wheel/cudart64_*.dll;\
        \ do\n  if [ -f \"$dll\" ]; then\n    mv \"$dll\" win-torch-wheel-extracted/bin/x64/\n\
        \    echo \"Moved $(basename $dll) to win-torch-wheel-extracted/bin/x64/\"\
        \n  fi\ndone\n\n# Verify CUDA libraries and DLLs are present\necho \"CUDA\
        \ libraries:\"\nls -la win-torch-wheel-extracted/lib/x64/ || echo \"No CUDA\
        \ libraries found\"\necho \"CUDA DLLs:\"\nls -la win-torch-wheel-extracted/bin/x64/\
        \ || echo \"No CUDA DLLs found\"\n"
    - name: Check for keep-going label and re-enabled test issues
      id: keep-going
      uses: pytorch/pytorch/.github/actions/filter-test-configs@main
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        test-matrix: ${{ inputs.test-matrix }}
        job-name: ${{ steps.setup-linux.outputs.job-name }}
    - name: Set test step time
      id: test-timeout
      shell: bash
      env:
        JOB_TIMEOUT: ${{ matrix.mem_leak_check == 'mem_leak_check' && 600 || inputs.timeout-minutes
          }}
      run: 'echo "timeout=$((JOB_TIMEOUT-30))" >> "${GITHUB_OUTPUT}"

        '
    - name: Test
      id: test
      timeout-minutes: ${{ fromJson(steps.test-timeout.outputs.timeout) }}
      env:
        BUILD_ENVIRONMENT: ${{ inputs.build-environment }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        GITHUB_JOB: ${{ github.job }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        JOB_ID: ${{ steps.setup-linux.outputs.job-id }}
        JOB_NAME: ${{ steps.setup-linux.outputs.job-name }}
        BRANCH: ${{ steps.setup-linux.outputs.branch }}
        SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        TEST_CONFIG: ${{ matrix.config }}
        SHARD_NUMBER: ${{ matrix.shard }}
        NUM_TEST_SHARDS: ${{ matrix.num_shards }}
        EXTRA_FLAGS: ${{ matrix.extra_flags || '' }}
        OP_BENCHMARK_TESTS: ${{ matrix.op_benchmark_tests }}
        REENABLED_ISSUES: ${{ steps.keep-going.outputs.reenabled-issues }}
        CONTINUE_THROUGH_ERROR: ${{ steps.keep-going.outputs.keep-going }}
        VERBOSE_TEST_LOGS: ${{ steps.keep-going.outputs.ci-verbose-test-logs }}
        TEST_SHOWLOCALS: ${{ steps.keep-going.outputs.ci-test-showlocals }}
        NO_TEST_TIMEOUT: ${{ steps.keep-going.outputs.ci-no-test-timeout }}
        NO_TD: ${{ steps.keep-going.outputs.ci-no-td }}
        TD_DISTRIBUTED: ${{ steps.keep-going.outputs.ci-td-distributed }}
        SCCACHE_BUCKET: ossci-compiler-cache-circleci-v2
        SCCACHE_REGION: us-east-1
        SCCACHE_S3_NO_CREDENTIALS: ${{ steps.aws-creds.outcome != 'success' && 'true'
          || 'false' }}
        XLA_CUDA: ${{ contains(inputs.build-environment, 'xla') && '0' || '' }}
        XLA_CLANG_CACHE_S3_BUCKET_NAME: ossci-compiler-clang-cache-circleci-xla
        PYTORCH_TEST_CUDA_MEM_LEAK_CHECK: ${{ matrix.mem_leak_check && '1' || '0'
          }}
        PYTORCH_TEST_RERUN_DISABLED_TESTS: ${{ matrix.rerun_disabled_tests && '1'
          || '0' }}
        TESTS_TO_INCLUDE: ${{ inputs.tests-to-include }}
        DASHBOARD_TAG: ${{ inputs.dashboard-tag }}
        ENABLE_TORCH_TRACE: ${{ inputs.enable-torch-trace }}
        VLLM_TEST_HUGGING_FACE_TOKEN: ${{ secrets.VLLM_TEST_HUGGING_FACE_TOKEN }}
        HF_CACHE: /mnt/hf_cache
        TRANSFORMERS_OFFLINE: ${{ (github.event_name == 'schedule' || github.event_name
          == 'workflow_dispatch' || contains(steps.keep-going.outputs.labels, 'ci-refresh-hf-cache'))
          && '0' || '1' }}
        HF_DATASETS_OFFLINE: ${{ (github.event_name == 'schedule' || github.event_name
          == 'workflow_dispatch' || contains(steps.keep-going.outputs.labels, 'ci-refresh-hf-cache'))
          && '0' || '1' }}
        HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        SCRIBE_GRAPHQL_ACCESS_TOKEN: ${{ secrets.SCRIBE_GRAPHQL_ACCESS_TOKEN }}
        ARTIFACTS_FILE_SUFFIX: ${{ github.job }}-${{ matrix.config }}-${{ matrix.shard
          }}-${{ matrix.num_shards }}-${{ matrix.runner }}_${{ steps.setup-linux.outputs.job-id
          }}
        TORCH_TPU_TEXT_FILE: /var/lib/jenkins/workspace/.github/ci_commit_pins/torch_tpu.txt
        USE_ARC: '1'
      shell: bash
      run: "set -x\n\nif [[ \"${TEST_CONFIG}\" == 'multigpu' ]]; then\n  TEST_COMMAND=.ci/pytorch/multigpu-test.sh\n\
        else\n  TEST_COMMAND=.ci/pytorch/test.sh\nfi\n\n# Just create an empty HF_CACHE\
        \ dir if it doesn't exist. This dir is not\n# used for anything besides vLLM\
        \ jobs\nif [[ ! -d \"${HF_CACHE}\" ]]; then\n  export HF_CACHE=\"${RUNNER_TEMP}/hf_cache\"\
        \n  mkdir -p \"${HF_CACHE}\"\n\n  # When there is no cache directory, e.g.\
        \ benchmark, the job has no\n  # way but to reach out to HF if needed\n  export\
        \ TRANSFORMERS_OFFLINE=0\n  export HF_DATASETS_OFFLINE=0\nfi\n\n# shellcheck\
        \ disable=SC2046\npython3 -m pip install $(echo dist/*.whl)[opt-einsum]\n\
        ${TEST_COMMAND}\n"
    - name: Configure AWS credentials
      id: aws-creds-benchmark
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
      with:
        role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_upload-benchmark-results
        aws-region: us-east-1
    - name: Upload pytest cache if tests failed
      uses: pytorch/pytorch/.github/actions/pytest-cache-upload@main
      continue-on-error: true
      if: failure() && steps.test.conclusion && steps.test.conclusion == 'failure'
        && steps.aws-creds-benchmark.outcome == 'success'
      with:
        cache_dir: .pytest_cache
        shard: ${{ matrix.shard }}
        sha: ${{ github.event.pull_request.head.sha || github.sha }}
        test_config: ${{ matrix.config }}
        job_identifier: ${{ github.workflow }}_${{ inputs.build-environment }}
    - name: Upload the benchmark results
      if: steps.aws-creds-benchmark.outcome == 'success'
      uses: pytorch/test-infra/.github/actions/upload-benchmark-results@main
      with:
        benchmark-results-dir: test/test-reports
        dry-run: false
        schema-version: v3
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Print remaining test logs
      shell: bash
      if: always() && steps.test.conclusion
      run: 'cat test/**/*_toprint.log || true

        '
    - name: Upload test artifacts
      uses: pytorch/pytorch/.github/actions/upload-test-artifacts@main
      if: always() && steps.test.conclusion && steps.test.conclusion != 'skipped'
      with:
        file-suffix: ${{ github.job }}-${{ matrix.config }}-${{ matrix.shard }}-${{
          matrix.num_shards }}-${{ matrix.runner }}_${{ steps.setup-linux.outputs.job-id
          }}
        use-gha: ${{ inputs.use-gha }}
        s3-bucket: ${{ inputs.s3-bucket }}
