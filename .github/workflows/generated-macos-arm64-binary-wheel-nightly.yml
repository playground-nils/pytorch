name: macos-arm64-binary-wheel
'on':
  push:
    branches:
    - nightly
    tags:
    - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
    - ciflow/binaries/*
    - ciflow/binaries_libtorch/*
    - ciflow/binaries_wheel/*
  workflow_dispatch: null
env:
  ALPINE_IMAGE: 308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine
  AWS_DEFAULT_REGION: us-east-1
  BUILD_ENVIRONMENT: macos-arm64-binary-wheel
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  SKIP_ALL_TESTS: 0
concurrency:
  group: macos-arm64-binary-wheel-${{ github.event.pull_request.number || github.ref_name
    }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch'
    }}
  cancel-in-progress: true
jobs:
  wheel-build:
    if: ${{ github.repository_owner == 'playground-nils' }}
    runs-on: macos-26-xlarge
    timeout-minutes: 240
    env:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: cpu
      GPU_ARCH_TYPE: cpu
      SKIP_ALL_TESTS: 1
      DESIRED_PYTHONS: 3.10 3.11 3.12 3.13 3.14 3.14t
      PYTORCH_EXTRA_INSTALL_REQUIREMENTS: cuda-toolkit[nvrtc,cudart,cupti,cufft,curand,cusolver,cusparse,cufile,nvjitlink,nvtx]==13.0.2;
        platform_system == 'Linux' | nvidia-cublas>=13.1.0.3,<=13.1.1.3; platform_system
        == 'Linux' | cuda-bindings>=13.0.3,<14; platform_system == 'Linux' | nvidia-cudnn-cu13==9.20.0.48;
        platform_system == 'Linux' | nvidia-cusparselt-cu13==0.8.1; platform_system
        == 'Linux' | nvidia-nccl-cu13==2.29.7; platform_system == 'Linux' | nvidia-nvshmem-cu13==3.4.5;
        platform_system == 'Linux'
    steps:
    - name: Populate runner env
      shell: bash
      run: 'echo "BINARY_ENV_FILE=${RUNNER_TEMP}/env" >> "${GITHUB_ENV}"

        '
    - name: Checkout PyTorch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha
          || github.sha }}
        submodules: recursive
        show-progress: false
    - name: Clean PyTorch checkout
      run: '# Remove any artifacts from the previous checkouts

        git clean -fxd

        '
    - name: Install libomp
      run: '"${PYTORCH_ROOT}/.ci/wheel/install_libomp.sh"

        '
    - name: Install uv
      uses: pytorch/test-infra/.github/actions/setup-uv@main
      with:
        enable-cache: true
    - name: Pre-fetch all CPython versions
      run: uv python install $DESIRED_PYTHONS
    - name: Build all wheels
      run: '"${PYTORCH_ROOT}/.ci/wheel/build_all_macos_wheels.sh"

        '
    - name: Delocate all wheels
      run: '"${PYTORCH_ROOT}/.ci/wheel/delocate_wheels.sh"

        '
    - name: Upload wheel-py3_10-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_10-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_10-cpu
    - name: Upload wheel-py3_11-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_11-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_11-cpu
    - name: Upload wheel-py3_12-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_12-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_12-cpu
    - name: Upload wheel-py3_13-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_13-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_13-cpu
    - name: Upload wheel-py3_14-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_14-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_14-cpu
    - name: Upload wheel-py3_14t-cpu
      uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: wheel-py3_14t-cpu
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/artifacts/wheel-py3_14t-cpu
  wheel-test-upload:
    if: ${{ github.repository_owner == 'playground-nils' }}
    needs: wheel-build
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - desired_python: '3.10'
          setup_python_version: 3.10.4
          freethreaded: false
          build_name: wheel-py3_10-cpu
        - desired_python: '3.11'
          setup_python_version: 3.11.4
          freethreaded: false
          build_name: wheel-py3_11-cpu
        - desired_python: '3.12'
          setup_python_version: 3.12.4
          freethreaded: false
          build_name: wheel-py3_12-cpu
        - desired_python: '3.13'
          setup_python_version: 3.13.4
          freethreaded: false
          build_name: wheel-py3_13-cpu
        - desired_python: '3.14'
          setup_python_version: 3.14.0
          freethreaded: false
          build_name: wheel-py3_14-cpu
        - desired_python: 3.14t
          setup_python_version: 3.14.0
          freethreaded: true
          build_name: wheel-py3_14t-cpu
    uses: ./.github/workflows/_binary-test-macos.yml
    with:
      build_name: ${{ matrix.build_name }}
      setup_python_version: ${{ matrix.setup_python_version }}
      freethreaded: ${{ matrix.freethreaded }}
      desired_python: ${{ matrix.desired_python }}
      package_type: wheel
      desired_cuda: cpu
      gpu_arch_type: cpu
      docker_image: manylinux2_28-builder
      docker_image_tag_prefix: cpu
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  libtorch-cpu-shared-with-deps-release-extract:
    if: ${{ github.repository_owner == 'playground-nils' }}
    needs: wheel-build
    runs-on: macos-26-xlarge
    timeout-minutes: 60
    env:
      DESIRED_CUDA: cpu
      LIBTORCH_VARIANT: shared-with-deps
    steps:
    - name: Checkout PyTorch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha
          || github.sha }}
        sparse-checkout: .ci/libtorch/
        show-progress: false
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.10.4
        freethreaded: false
    - uses: actions/download-artifact@v4.1.7
      name: Download Wheel Artifact
      with:
        name: wheel-py3_10-cpu
        path: ${{ runner.temp }}/wheel_artifact/
    - name: Extract libtorch from wheel
      run: "set -eux\nmkdir -p \"${{ runner.temp }}/libtorch_output\"\npython3 .ci/libtorch/extract_libtorch_from_wheel.py\
        \ \\\n  --wheel-dir \"${{ runner.temp }}/wheel_artifact\" \\\n  --output-dir\
        \ \"${{ runner.temp }}/libtorch_output\" \\\n  --platform macos \\\n  --desired-cuda\
        \ \"$DESIRED_CUDA\" \\\n  --libtorch-variant \"$LIBTORCH_VARIANT\"\n"
    - uses: actions/upload-artifact@v4.4.0
      if: always()
      with:
        name: libtorch-cpu-shared-with-deps-release
        retention-days: 14
        if-no-files-found: error
        path: ${{ runner.temp }}/libtorch_output/
  libtorch-cpu-shared-with-deps-release-upload:
    if: ${{ github.repository_owner == 'playground-nils' }}
    permissions:
      id-token: write
      contents: read
    needs: libtorch-cpu-shared-with-deps-release-extract
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: cpu
      GPU_ARCH_TYPE: cpu
      LIBTORCH_CONFIG: release
      LIBTORCH_VARIANT: shared-with-deps
      build_name: libtorch-cpu-shared-with-deps-release
      use_s3: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml
