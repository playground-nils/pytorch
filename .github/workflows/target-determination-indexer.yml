name: Index PyTorch Tests for Target Determination
'on':
  workflow_dispatch: null
  schedule:
  - cron: 0 0 * * *
permissions:
  id-token: write
  contents: read
jobs:
  get-label-type:
    if: github.repository_owner == 'playground-nils'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login
        }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
  index:
    needs: get-label-type
    runs-on: ${{ needs.get-label-type.outputs.label-type }}linux.g5.4xlarge.nvidia.gpu
    environment: target-determinator-env
    steps:
    - name: Setup Linux
      uses: pytorch/pytorch/.github/actions/setup-linux@main
    - name: Login to ECR
      uses: ./.github/actions/ecr-login
    - name: Calculate docker image
      id: calculate-docker-image
      uses: pytorch/test-infra/.github/actions/calculate-docker-image@main
      with:
        docker-image-name: ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11
        working-directory: .
    - name: Use following to pull public copy of the image
      id: print-ghcr-mirror
      env:
        ECR_DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
      shell: bash
      run: 'tag=${ECR_DOCKER_IMAGE##*:}

        echo "docker pull ghcr.io/pytorch/ci-image:${tag/:/-}"

        '
    - name: Pull docker image
      uses: pytorch/test-infra/.github/actions/pull-docker-image@main
      with:
        docker-image: ${{ steps.calculate-docker-image.outputs.docker-image }}
    - name: Install nvidia driver, nvidia-docker runtime, set GPU_FLAG
      id: install-nvidia-driver
      uses: pytorch/test-infra/.github/actions/setup-nvidia@main
    - name: Clone CodeLlama
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        repository: osalpekar/codellama
        ref: 1ec50e0cfc0fadc3b6ceb146617e2119ab26eb34
        path: codellama
    - name: Clone Target Determination Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        repository: osalpekar/llm-target-determinator
        ref: v0.0.2
        path: llm-target-determinator
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722
      with:
        role-to-assume: arn:aws:iam::308535385114:role/gha_target_determinator_s3_read_write
        aws-region: us-east-1
    - name: Download checkpoint
      shell: bash
      env:
        AWS_DEFAULT_REGION: us-east-1
      run: "# Do this outside of docker so I don't have to put env vars in\npip3 install\
        \ awscli==1.29.40\ncd codellama\nmkdir \"CodeLlama-7b-Python\"\naws s3 cp\
        \ \\\n  \"s3://target-determinator-assets/CodeLlama-7b-Python\" \\\n  \"CodeLlama-7b-Python\"\
        \ \\\n  --recursive\n"
    - name: Run indexer
      shell: bash -l {0}
      env:
        DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        AWS_DEFAULT_REGION: us-east-1
      run: "# detached container should get cleaned up by teardown_ec2_linux\n# Disable\
        \ shellcheck warning for GPU_FLAG\n# shellcheck disable=SC2086\n# setup-linux\
        \ checks out pytorch directly at GITHUB_WORKSPACE, but\n# llm-target-determinator@v0.0.2\
        \ expects `pytorch/` as a sibling of\n# its own checkout, so remap the layout\
        \ inside the container.\ncontainer_name=$(docker run \\\n  ${GPU_FLAG:-} \\\
        \n  -e MAX_JOBS=\"$(nproc --ignore=2)\" \\\n  -e AWS_DEFAULT_REGION \\\n \
        \ --env-file=\"/tmp/github_env_${GITHUB_RUN_ID}\" \\\n  --security-opt seccomp=unconfined\
        \ \\\n  --cap-add=SYS_PTRACE \\\n  --tty \\\n  --detach \\\n  --user jenkins\
        \ \\\n  -v \"${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace/pytorch\" \\\n\
        \  -v \"${GITHUB_WORKSPACE}/codellama:/var/lib/jenkins/workspace/codellama\"\
        \ \\\n  -v \"${GITHUB_WORKSPACE}/llm-target-determinator:/var/lib/jenkins/workspace/llm-target-determinator\"\
        \ \\\n  -w /var/lib/jenkins/workspace \\\n  \"${DOCKER_IMAGE}\"\n)\nchmod\
        \ +x .github/scripts/td_llm_indexer.sh\ndocker exec -t \"${container_name}\"\
        \ sh -c 'pytorch/.github/scripts/td_llm_indexer.sh'\n"
    - name: Upload to s3
      shell: bash -l {0}
      env:
        AWS_DEFAULT_REGION: us-east-1
      run: "cd llm-target-determinator/assets\n\nTIMESTAMP=$(date -Iseconds)\nZIP_NAME=\"\
        indexer-files-${TIMESTAMP}.zip\"\n\n# Create a zipfile with all the generated\
        \ indices\nzip -r \"${ZIP_NAME}\" indexer-files\n\n# Note that because the\
        \ below 2 operations are not atomic, there will\n# be a period of a few seconds\
        \ between these where there is no index\n# present in the latest/ folder.\
        \ To account for this, the retriever\n# should have some retry logic with\
        \ backoff to ensure fetching the\n# index doesn't fail.\n# Move the old index\
        \ into the archived/ folder\naws s3 mv \\\n  \"s3://target-determinator-assets/indexes/latest\"\
        \ \\\n  \"s3://target-determinator-assets/indexes/archived\" \\\n  --recursive\n\
        \n# Move the new index into the latestl/ folder\naws s3 cp \\\n  \"${ZIP_NAME}\"\
        \ \\\n  \"s3://target-determinator-assets/indexes/latest/${ZIP_NAME}\"\n"
    - name: Teardown Linux
      uses: pytorch/test-infra/.github/actions/teardown-linux@main
      if: always()
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true
