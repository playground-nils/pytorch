name: Mac MPS
'on':
  push:
    tags:
    - ciflow/mps/*
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name
    }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch'
    }}
  cancel-in-progress: true
permissions: read-all
jobs:
  macos-py3-arm64-build:
    if: github.repository_owner == 'playground-nils'
    name: macos-py3-arm64
    uses: ./.github/workflows/_mac-build.yml
    with:
      sync-tag: macos-py3-arm64-build
      build-environment: macos-py3-arm64
      runner-type: macos-m1-stable
      build-generates-artifacts: true
      python-version: 3.12.7
      test-matrix: "{ include: [\n  { config: \"test_mps\", shard: 1, num_shards:\
        \ 1, runner: \"macos-m1-14\" },\n  { config: \"test_mps\", shard: 1, num_shards:\
        \ 1, runner: \"macos-m2-15\" },\n  { config: \"test_mps\", shard: 1, num_shards:\
        \ 1, runner: \"macos-m2-26\" },\n]}\n"
    secrets: inherit
  macos-py3-arm64-mps-test:
    name: macos-py3-arm64-mps
    uses: ./.github/workflows/_mac-test.yml
    needs: macos-py3-arm64-build
    with:
      sync-tag: macos-py3-arm64-mps-test
      build-environment: ${{ needs.macos-py3-arm64-build.outputs.build-environment
        }}
      python-version: 3.12.7
      test-matrix: ${{ needs.macos-py3-arm64-build.outputs.test-matrix }}
      disable-monitor: false
    secrets: inherit
