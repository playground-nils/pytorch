name: B200 Smoke Tests
'on':
  pull_request:
    paths:
    - .github/workflows/test-b200.yml
  workflow_dispatch: null
  schedule:
  - cron: 0 */2 * * *
  push:
    tags:
    - ciflow/b200/*
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}-${{ github.event_name == 'workflow_dispatch' }}-${{ github.event_name == 'schedule'
    }}
  cancel-in-progress: true
permissions:
  id-token: write
  contents: read
  actions: read
jobs:
  get-label-type:
    if: github.repository_owner == 'playground-nils'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login
        }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}
      check_experiments: arc,lf
  linux-jammy-cuda13_0-py3_10-gcc11-sm100-build:
    name: linux-jammy-cuda13.0-py3.10-gcc11-sm100
    uses: ./.github/workflows/_linux-build.yml
    needs: get-label-type
    with:
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      runner: linux.r7i.4xlarge
      build-environment: linux-jammy-cuda13.0-py3.10-gcc11-sm100
      docker-image-name: ci-image:pytorch-linux-jammy-cuda13.0-cudnn9-py3-gcc11
      ci-docker-hash: ${{ needs.get-label-type.outputs.ci-docker-hash }}
      cuda-arch-list: '10.0'
      test-matrix: "{ include: [\n  { config: \"smoke_b200\", shard: 1, num_shards:\
        \ 1, runner: \"linux.dgx.b200\" },\n]}\n"
      use-arc: ${{ needs.get-label-type.outputs.use-arc == 'true' }}
      python-version: '3.10'
      compiler: gcc11
      cuda-version: '13.0'
    secrets: inherit
  linux-jammy-cuda13_0-py3_10-gcc11-sm100-test:
    name: linux-jammy-cuda13.0-py3.10-gcc11-sm100
    uses: ./.github/workflows/_linux-test.yml
    needs:
    - linux-jammy-cuda13_0-py3_10-gcc11-sm100-build
    - get-label-type
    with:
      build-environment: ${{ needs.linux-jammy-cuda13_0-py3_10-gcc11-sm100-build.outputs.build-environment
        }}
      docker-image: ${{ needs.linux-jammy-cuda13_0-py3_10-gcc11-sm100-build.outputs.docker-image
        }}
      test-matrix: ${{ needs.linux-jammy-cuda13_0-py3_10-gcc11-sm100-build.outputs.test-matrix
        }}
      test-matrix-osdc: ${{ needs.linux-jammy-cuda13_0-py3_10-gcc11-sm100-build.outputs.test-matrix-osdc
        }}
      use-arc: ${{ needs.get-label-type.outputs.use-arc == 'true' }}
      python-version: '3.10'
      compiler: gcc11
      cuda-version: '13.0'
    secrets: inherit
