name: Check whether the workflow owner can use ARC runners
'on':
  workflow_call:
    inputs:
      check_experiments:
        required: false
        type: string
        description: 'Comma-separated list of non-default experiments to opt into
          for this workflow.

          These are added on top of all default experiments. If not defined, only
          default experiments are included.

          '
      opt_out_experiments:
        required: false
        type: string
        description: Comma-separated list of experiments this workflow will opt-out
          of.
      triggering_actor:
        required: true
        type: string
        description: The triggering_actor for the workflow. Use github.triggering_actor
      issue_owner:
        required: true
        type: string
        description: The owner of the issue. Use github.event.pull_request.user.login
          || github.event.issue.user.login
      curr_branch:
        required: true
        type: string
        description: Current branch or tag.
      curr_ref_type:
        required: false
        type: string
        default: branch
        description: The value of "github.ref_type", "branch" or "tag"
      issue_number:
        required: false
        type: string
        default: '5132'
        description: 'Fetch''s GitHub Issue from pytorch/test-infra

          Example: https://github.com/pytorch/test-infra/issues/5132

          '
      runner_config:
        required: false
        type: string
        default: ''
        description: Runner configuration used by the caller to derive runner-type.
    outputs:
      label-type:
        description: Type of runners to use
        value: ${{ jobs.runner-determinator.outputs.label-type }}
      runner-config:
        description: Normalized runner configuration derived from the caller input
        value: ${{ jobs.runner-determinator.outputs.runner-config }}
      runner-type:
        description: Runner suffix to use for workflow-specific runner selection
        value: ${{ jobs.runner-determinator.outputs.runner-type }}
      runner-label:
        description: Fully qualified runner label derived from runner_config
        value: ${{ jobs.runner-determinator.outputs.runner-label }}
      use-arc:
        description: Whether to use ARC runners
        value: ${{ jobs.runner-determinator.outputs.use-arc }}
      ci-docker-hash:
        description: Git tree hash of .ci/docker, used as the suffix of CI docker
          image tags
        value: ${{ jobs.runner-determinator.outputs.ci-docker-hash }}
jobs:
  runner-determinator:
    if: github.repository_owner == 'playground-nils'
    runs-on: ubuntu-latest
    outputs:
      label-type: ${{ steps.set-condition.outputs.label-type }}
      runner-config: ${{ steps.set-runner-info.outputs.runner-config }}
      runner-type: ${{ steps.set-runner-info.outputs.runner-type }}
      runner-label: ${{ steps.set-runner-info.outputs.runner-label }}
      use-arc: ${{ steps.set-condition.outputs.use-arc }}
      ci-docker-hash: ${{ steps.ci-docker-hash.outputs.ci-docker-hash }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      TRIGGERING_ACTOR: ${{ inputs.triggering_actor }}
      ISSUE_OWNER: ${{ inputs.issue_owner }}
      CHECK_EXPERIMENTS: ${{ inputs.check_experiments }}
      OPT_OUT_EXPERIMENTS: ${{ inputs.opt_out_experiments }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      WORKFLOW_NAME: ${{ github.workflow }}
    steps:
    - name: Checkout PyTorch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha
          || github.sha }}
        fetch-depth: 1
        sparse-checkout: '.github/scripts/runner_determinator.py

          .ci/docker

          '
        sparse-checkout-cone-mode: false
    - name: Compute .ci/docker tree hash
      id: ci-docker-hash
      shell: bash
      run: 'echo "ci-docker-hash=$(git rev-parse HEAD:.ci/docker)" >> "$GITHUB_OUTPUT"

        '
    - name: Install dependencies
      run: python3 -m pip install urllib3==1.26.18 PyGithub==2.3.0
    - name: Get the workflow type for the current user
      id: set-condition
      run: "curr_branch=\"${{ inputs.curr_branch }}\"\ncurr_ref_type=\"${{ inputs.curr_ref_type\
        \ }}\"\necho \"Current branch is '$curr_branch'\"\n\n# The workflow YAML is\
        \ loaded from main (via @main in callers) but the\n# script is checked out\
        \ from the PR head, so PRs that predate a newly\n# added optional flag will\
        \ reject it. Probe --help and only pass flags\n# the checked-out script supports.\n\
        extra_args=()\nhelp_text=\"$(python3 .github/scripts/runner_determinator.py\
        \ --help 2>&1 || true)\"\nif grep -q -- '--workflow-name' <<<\"$help_text\"\
        ; then\n  extra_args+=(--workflow-name \"${WORKFLOW_NAME}\")\nelse\n  echo\
        \ \"::warning::runner_determinator.py on this branch is missing --workflow-name;\
        \ skipping. Rebase the PR onto main to pick it up.\"\nfi\n\npython3 .github/scripts/runner_determinator.py\
        \ \\\n  --github-token \"$GITHUB_TOKEN\" \\\n  --github-issue \"$ISSUE_NUMBER\"\
        \ \\\n  --github-branch \"$curr_branch\" \\\n  --github-actor \"$TRIGGERING_ACTOR\"\
        \ \\\n  --github-issue-owner \"$ISSUE_OWNER\" \\\n  --github-ref-type \"$curr_ref_type\"\
        \ \\\n  --github-repo \"$GITHUB_REPOSITORY\" \\\n  --eligible-experiments\
        \ \"$CHECK_EXPERIMENTS\" \\\n  --opt-out-experiments \"$OPT_OUT_EXPERIMENTS\"\
        \ \\\n  --pr-number \"${PR_NUMBER}\" \\\n  \"${extra_args[@]}\"\n"
    - name: Determine runner configuration
      id: set-runner-info
      run: "case \"${{ inputs.runner_config }}\" in\n  \"\")\n    runner_config=\"\
        m8g\"\n    runner_type=\"metal-24xl\"\n    ;;\n  \"m8g\")\n    runner_config=\"\
        m8g\"\n    runner_type=\"metal-24xl\"\n    ;;\n  \"m7g\")\n    runner_config=\"\
        m7g\"\n    runner_type=\"metal\"\n    ;;\n  *)\n    echo \"Unsupported runner_config:\
        \ ${{ inputs.runner_config }}\"\n    exit 1\n    ;;\nesac\n\nrunner_label=\"\
        linux.arm64.${runner_config}.${runner_type}\"\necho \"runner-config=${runner_config}\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"runner-type=${runner_type}\" >> \"$GITHUB_OUTPUT\"\
        \necho \"runner-label=${runner_label}\" >> \"$GITHUB_OUTPUT\"\n"
